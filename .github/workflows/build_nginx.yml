name: Build Nginx Image

# art-gallery-nginx イメージをビルドする（2層イメージ戦略のLayer 2）。
# nginx-siteguard-base をベースに entrypoint.sh を追加するのみのため高速にビルドできる。
#
# 前提: 使用する base_version の nginx-siteguard-base イメージが GHCR に存在すること。
#   → build_nginx_base.yml を先に実行して GHCR に登録する。

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'ビルドするイメージのタグ (例: v1.0.0。未指定時はリポジトリ変数を参照)'
        required: false
        type: string
      base_version:
        description: '使用するベースイメージのバージョン (形式: v{nginx}-sg{siteguard}、例: v1.26.3-sg8.00-3)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write

    steps:
      - name: Checkout art-gallery-release-tools repository
        uses: actions/checkout@v4

      - name: Install yq (YAML processor)
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Set Context
        run: |
          VERSION="${{ github.event.inputs.release_version || vars.RELEASE_VERSION }}"
          if [ -z "$VERSION" ]; then
            echo "::error::RELEASE_VERSION が定義されていません。"
            exit 1
          fi
          echo "NGINX_IMAGE_TAG=${VERSION}" >> $GITHUB_ENV
          echo "NGINX_BASE_VERSION=${{ github.event.inputs.base_version }}" >> $GITHUB_ENV

          GITHUB_OWNER=$(yq '.github_owner' ansible/group_vars/all.yml)
          GHCR_BASE_REGISTRY=$(yq '.ghcr_base_registry' ansible/group_vars/all.yml)
          NGINX_REPO_NAME=$(yq '.service_repo_names.nginx' ansible/group_vars/all.yml)

          if [ -z "${GITHUB_OWNER}" ] || [ -z "${GHCR_BASE_REGISTRY}" ] || [ -z "${NGINX_REPO_NAME}" ]; then
            echo "::error::Ansibleのgroup_vars/all.ymlから変数を取得できませんでした。"
            exit 1
          fi

          echo "NGINX_IMAGE_NAME=${GHCR_BASE_REGISTRY}/${GITHUB_OWNER}/${NGINX_REPO_NAME}" >> $GITHUB_ENV
          echo "NGINX_BASE_IMAGE_NAME=${GHCR_BASE_REGISTRY}/${GITHUB_OWNER}/nginx-siteguard-base" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Ansible and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
          ansible-galaxy collection install community.docker

      - name: Build and Push Nginx Image with Ansible
        run: |
          cd ansible
          ansible-playbook playbook_build_nginx.yml \
            --inventory inventory/ci.yml \
            --extra-vars "{
              \"target_hosts\":\"ci-server\",
              \"nginx_image_tag\":\"${{ env.NGINX_IMAGE_TAG }}\",
              \"nginx_base_version\":\"${{ env.NGINX_BASE_VERSION }}\"
            }" \
            --tags "build-nginx"

          docker push ${{ env.NGINX_IMAGE_NAME }}:${{ env.NGINX_IMAGE_TAG }}

      - name: Create PR for nginx manifest update
        uses: ./.github/actions/create-build-manifest-pr
        with:
          token: ${{ secrets.GH_TOKEN_FOR_ART_GALLERY_RELEASE_TOOLS }}
          manifest_path: manifest/nginx/image/nginx_version_manifest.yml
          service_name: nginx
          image_tag: ${{ env.NGINX_IMAGE_TAG }}
          source_ref: "base-${{ github.event.inputs.base_version }}"
          source_sha: ${{ github.sha }}
          image_full_name: ${{ env.NGINX_IMAGE_NAME }}
          build_run_id: ${{ github.run_id }}
          build_workflow: ${{ github.workflow }}
          base_branch: ${{ github.event.repository.default_branch }}
