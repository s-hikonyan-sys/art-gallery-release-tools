name: Deploy Secrets API

on:
  workflow_dispatch:
    inputs:
      run_deploy_image:
        description: '1. [デプロイ:イメージ] サーバーのイメージを更新 (Pull & Restart)'
        required: false
        type: boolean
        default: false
      run_deploy_code:
        description: '2. [デプロイ:コード] サーバーのコードと設定を更新 (Git Pull & Restart)'
        required: false
        type: boolean
        default: false
      release_version:
        description: 'GHCR ペイロード用のイメージタグ（manifest/secrets/image/secrets_version_manifest.yml のキー。未指定時は vars.RELEASE_VERSION）'
        required: false
        type: string
      secrets_ref:
        description: 'code_version 未指定時の secrets の ref。code_version 指定時はマニフェストが優先されます'
        required: false
        default: 'main'
        type: string
      code_version:
        description: 'コードデプロイ時: manifest/secrets/code/secrets_code_manifest.yml のキー（未指定なら secrets_ref のみで取得）'
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      MANIFEST_SECRETS_IMAGE: manifest/secrets/image/secrets_version_manifest.yml
      MANIFEST_SECRETS_CODE: manifest/secrets/code/secrets_code_manifest.yml
      MANIFEST_SECRETS_DEPLOY: manifest/secrets/deploy/secrets_deploy_manifest.yml

    steps:
      - name: Checkout art-gallery-release-tools repository
        uses: actions/checkout@v4

      - name: Validate Inputs
        run: |
          if [ "${{ github.event.inputs.run_deploy_image }}" != "true" ] && [ "${{ github.event.inputs.run_deploy_code }}" != "true" ]; then
            echo "::error::'run_deploy_image' または 'run_deploy_code' の少なくとも一方は 'true' に設定してください。"
            exit 1
          fi

      - name: Install yq (YAML processor)
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Set Context
        id: context
        run: |
          VERSION="${{ github.event.inputs.release_version || vars.RELEASE_VERSION }}"
          if [ -z "$VERSION" ]; then
            echo "::error::RELEASE_VERSION が定義されていません。"
            exit 1
          fi
          echo "RELEASE_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "SECRETS_IMAGE_TAG=${VERSION}" >> $GITHUB_ENV
          echo "SECRETS_REF=${{ github.event.inputs.secrets_ref }}" >> $GITHUB_ENV
          echo "CODE_VERSION=${{ github.event.inputs.code_version }}" >> $GITHUB_ENV
          SECRETS_REF_INPUT="${{ github.event.inputs.secrets_ref }}"
          CODE_VERSION_INPUT="${{ github.event.inputs.code_version }}"
          
          # Ansibleのgroup_vars/all.ymlから変数を取得
          GITHUB_OWNER=$(yq '.github_owner' ansible/group_vars/all.yml)
          GHCR_BASE_REGISTRY=$(yq '.ghcr_base_registry' ansible/group_vars/all.yml)
          SECRETS_REPO_NAME=$(yq '.service_repo_names.secrets' ansible/group_vars/all.yml)
          
          if [ -z "${GITHUB_OWNER}" ] || [ -z "${GHCR_BASE_REGISTRY}" ] || [ -z "${SECRETS_REPO_NAME}" ]; then
            echo "::error::Ansibleのgroup_vars/all.ymlから変数を取得できませんでした。"
            exit 1
          fi
          
          echo "GITHUB_OWNER=${GITHUB_OWNER}" >> $GITHUB_ENV
          echo "SECRETS_REPO_NAME=${SECRETS_REPO_NAME}" >> $GITHUB_ENV
          echo "SECRETS_IMAGE_NAME=${GHCR_BASE_REGISTRY}/${GITHUB_OWNER}/${SECRETS_REPO_NAME}" >> $GITHUB_ENV

      - name: Install Ansible and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
          ansible-galaxy collection install community.docker

      # --- デプロイ準備 ---
      - name: Setup SSH for Production Deployment
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/ansible_deploy_key
          chmod 600 ~/.ssh/ansible_deploy_key
          echo "${{ secrets.PROD_SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Write Secrets Files for Production Deployment
        id: write-secrets-files
        uses: ./.github/actions/write-secrets-files
        with:
          secret_key: ${{ secrets.PROD_SECRET_KEY }}
          db_password_encrypted: ${{ secrets.PROD_DB_PASSWORD_ENCRYPTED }}
          env_name: prod

      # --- デプロイ工程 ---
      - name: Write Ansible extra-vars file
        run: |
          cat > /tmp/ansible_vars.json << 'VARS_EOF'
          {
            "target_hosts": "production",
            "prod_host": "${{ vars.PROD_HOST }}",
            "prod_ssh_user": "${{ vars.PROD_SSH_USER }}",
            "prod_ssh_key_path": "~/.ssh/ansible_deploy_key",
            "secrets_ref": "${{ env.SECRETS_REF }}",
            "secrets_image_tag": "${{ env.SECRETS_IMAGE_TAG }}",
            "github_token_secrets": "${{ secrets.GH_TOKEN_FOR_ART_GALLERY_SECRETS }}",
            "github_token_release_tools": "${{ secrets.GH_TOKEN_FOR_ART_GALLERY_RELEASE_TOOLS }}",
            "secrets_yaml_encrypted_path": "${{ steps.write-secrets-files.outputs.secrets_yaml_encrypted_path }}",
            "config_yaml_path": "${{ steps.write-secrets-files.outputs.config_yaml_path }}"
          }
          VARS_EOF
          chmod 600 /tmp/ansible_vars.json

          # Resolve SHA for deployment record
          set -euo pipefail

          IMG="${{ github.event.inputs.run_deploy_image }}"
          CODE="${{ github.event.inputs.run_deploy_code }}"
          CODE_VERSION="${{ env.CODE_VERSION }}"
          SECRETS_REF="${{ env.SECRETS_REF_INPUT }}"

          if [ "$IMG" = "true" ] && [ "$CODE" = "true" ]; then
            DEPLOY_TYPE="both"
          elif [ "$IMG" = "true" ]; then
            DEPLOY_TYPE="image"
          else
            DEPLOY_TYPE="code"
          fi

          # Fetch owner and repo name for git ls-remote if needed
          GITHUB_OWNER=$(yq -r '.github_owner' ansible/group_vars/all.yml)
          SECRETS_REPO_NAME=$(yq -r '.service_repo_names.secrets' ansible/group_vars/all.yml)

          REF_SHA=""
          if [ "$CODE" = "true" ]; then
            if [ -n "$CODE_VERSION" ]; then
              # Try to get SHA from code manifest
              CODE_REF_FROM_MANIFEST=$(yq -r ".secrets_code[\"${CODE_VERSION}\"].source_ref" "$MANIFEST_SECRETS_CODE")
              CODE_SHA_FROM_MANIFEST=$(yq -r ".secrets_code[\"${CODE_VERSION}\"].source_sha" "$MANIFEST_SECRETS_CODE")
              if [ -n "$CODE_REF_FROM_MANIFEST" ] && [ "$CODE_REF_FROM_MANIFEST" != "null" ] && \
                 [ -n "$CODE_SHA_FROM_MANIFEST" ] && [ "$CODE_SHA_FROM_MANIFEST" != "null" ]; then
                SECRETS_REF="$CODE_REF_FROM_MANIFEST" # Use manifest's ref
                REF_SHA="$CODE_SHA_FROM_MANIFEST"
              else
                echo "::warning::secrets_code_manifest.yml に code_version \"${CODE_VERSION}\" が見つからないか、不完全です。secrets_ref から SHA を解決します。"
              fi
            fi
            
            # If SHA not resolved from manifest, or no code_version, use git ls-remote
            if [ -z "$REF_SHA" ]; then
              REF_SHA=$(git ls-remote \
                "https://x-access-token:${{ secrets.GH_TOKEN_FOR_ART_GALLERY_SECRETS }}@github.com/${GITHUB_OWNER}/${SECRETS_REPO_NAME}.git" \
                "${SECRETS_REF}" | awk 'NR==1{print $1}')
            fi
          fi

          IMG_SHA=""
          if [ "$IMG" = "true" ]; then
            IMG_SHA=$(yq -r ".secrets[\"${{ env.RELEASE_VERSION }}\"].source_sha" "$MANIFEST_SECRETS_IMAGE")
            if [ "$IMG_SHA" = "null" ]; then IMG_SHA=""; fi
          fi

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          jq -n \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg dt "$DEPLOY_TYPE" \
            --arg rv "${{ env.RELEASE_VERSION }}" \
            --arg cv "$CODE_VERSION" \
            --arg sr "$SECRETS_REF" \
            --arg rc "$REF_SHA" \
            --arg ic "$IMG_SHA" \
            --arg url "$RUN_URL" \
            '{
              timestamp: $ts,
              deploy_type: $dt,
              release_version: $rv,
              code_version: (if $cv == "" then null else $cv end),
              secrets_ref: $sr,
              ref_commit_sha: (if $rc == "" then null else $rc end),
              image_source_sha: (if $ic == "" then null else $ic end),
              workflow_run_url: $url
            }' \
            | yq -P '.' > /tmp/deploy_entry.yml

          if [ ! -f "$MANIFEST_SECRETS_DEPLOY" ] || ! yq -e '.secrets_deployments' "$MANIFEST_SECRETS_DEPLOY" &>/dev/null; then
            printf '%s\n' '---' 'secrets_deployments: []' > "$MANIFEST_SECRETS_DEPLOY"
          fi
          yq -i '.secrets_deployments += [load("/tmp/deploy_entry.yml")]' "$MANIFEST_SECRETS_DEPLOY"
          rm -f /tmp/deploy_entry.yml
        
      - name: Deploy Secrets API Application
        run: |
          TAGS=""
          
          if [ "$DEPLOY_TYPE" = "image" ] || [ "$DEPLOY_TYPE" = "both" ]; then
            TAGS="deploy-compose,update-secrets-image"
          fi
          if [ "$DEPLOY_TYPE" = "code" ] || [ "$DEPLOY_TYPE" = "both" ]; then
            [ -n "$TAGS" ] && TAGS="${TAGS},"
            TAGS="${TAGS}secrets,restart-secrets"
          fi
          
          cd ansible
          ansible-playbook playbook_deploy_secrets.yml \
            --inventory inventory/production.yml \
            --extra-vars "@/tmp/ansible_vars.json" \
            --tags "${TAGS}"

      - name: Create pull request for deploy record
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RELEASE_VERSION="${{ env.RELEASE_VERSION }}"
          CV="${{ env.CODE_VERSION }}"
          BRANCH="chore/secrets-deploy-record-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "$MANIFEST_SECRETS_DEPLOY"
          git commit -m "chore(secrets): record production deploy ${RELEASE_VERSION}"
          git push origin "$BRANCH"
          BODY_FILE=$(mktemp)
          {
            echo "Deploy workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "- release_version: \`${RELEASE_VERSION}\`"
            echo "- code_version: \`${CV:-"(none)"}\`"
          } > "$BODY_FILE"
          gh pr create \
            --title "chore(secrets): record production deploy ${RELEASE_VERSION}" \
            --body-file "$BODY_FILE" \
            --base "${{ github.event.repository.default_branch }}"
          rm -f "$BODY_FILE"

      - name: Remove extra-vars file
        if: always()
        run: rm -f /tmp/ansible_vars.json
