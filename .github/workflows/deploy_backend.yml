name: Deploy Backend

on:
  workflow_dispatch:
    inputs:
      run_deploy_image:
        description: '1. [デプロイ:イメージ] サーバーのイメージを更新 (Pull & Restart)'
        required: false
        type: boolean
        default: false
      run_deploy_code:
        description: '2. [デプロイ:コード] サーバーのコードと設定を更新 (Git Pull & Restart)'
        required: false
        type: boolean
        default: false
      release_version:
        description: 'デプロイ対象のリリースバージョン (例: v1.0.0。未指定時はリポジトリ変数を参照)'
        required: false
        type: string
      backend_ref:
        description: 'デプロイする backend リポジトリの ref (branch/tag/sha)'
        required: false
        default: 'main'
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout art-gallery-release-tools repository
        uses: actions/checkout@v4

      - name: Validate Inputs
        run: |
          if [ "${{ github.event.inputs.run_deploy_image }}" != "true" ] && [ "${{ github.event.inputs.run_deploy_code }}" != "true" ]; then
            echo "::error::'run_deploy_image' または 'run_deploy_code' の少なくとも一方は 'true' に設定してください。"
            exit 1
          fi

      - name: Install yq (YAML processor)
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Set Context
        id: context
        run: |
          VERSION="${{ github.event.inputs.release_version || vars.RELEASE_VERSION }}"
          if [ -z "$VERSION" ]; then
            echo "::error::RELEASE_VERSION が定義されていません。"
            exit 1
          fi
          echo "RELEASE_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "BACKEND_IMAGE_TAG=${VERSION}" >> $GITHUB_ENV
          echo "BACKEND_REF=${{ github.event.inputs.backend_ref }}" >> $GITHUB_ENV
          
          # Ansibleのgroup_vars/all.ymlから変数を取得
          # GitHub Actions Runner上で実行されるため、yqで直接パースする
          
          GITHUB_OWNER=$(yq '.github_owner' ansible/group_vars/all.yml)
          GHCR_BASE_REGISTRY=$(yq '.ghcr_base_registry' ansible/group_vars/all.yml)
          BACKEND_REPO_NAME=$(yq '.service_repo_names.backend' ansible/group_vars/all.yml)
          
          if [ -z "${GITHUB_OWNER}" ] || [ -z "${GHCR_BASE_REGISTRY}" ] || [ -z "${BACKEND_REPO_NAME}" ]; then
            echo "::error::Ansibleのgroup_vars/all.ymlから変数を取得できませんでした。"
            exit 1
          fi
          
          echo "GITHUB_OWNER=${GITHUB_OWNER}" >> $GITHUB_ENV
          echo "BACKEND_REPO_NAME=${BACKEND_REPO_NAME}" >> $GITHUB_ENV
          echo "BACKEND_IMAGE_NAME=${GHCR_BASE_REGISTRY}/${GITHUB_OWNER}/${BACKEND_REPO_NAME}" >> $GITHUB_ENV

      - name: Install Ansible and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
          ansible-galaxy collection install community.docker

      # --- デプロイ準備 ---
      - name: Setup SSH for Production Deployment
        run: |
          mkdir -p ~/.ssh
          # 特定のファイル名に依存せず "ansible_deploy_key" という名前で保存
          echo "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/ansible_deploy_key
          chmod 600 ~/.ssh/ansible_deploy_key
          echo "${{ secrets.PROD_SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      # --- デプロイ工程 ---
      - name: Write Ansible extra-vars file
        run: |
          cat > /tmp/ansible_vars.json << 'VARS_EOF'
          {
            "target_hosts": "production",
            "prod_host": "${{ vars.PROD_HOST }}",
            "prod_ssh_user": "${{ vars.PROD_SSH_USER }}",
            "prod_ssh_key_path": "~/.ssh/ansible_deploy_key",
            "backend_ref": "${{ env.BACKEND_REF }}",
            "backend_image_tag": "${{ env.BACKEND_IMAGE_TAG }}",
            "github_token_backend": "${{ secrets.GH_TOKEN_FOR_ART_GALLERY_BACKEND }}",
            "github_token_release_tools": "${{ secrets.GH_TOKEN_FOR_ART_GALLERY_RELEASE_TOOLS }}"
          }
          VARS_EOF
          chmod 600 /tmp/ansible_vars.json

      - name: Deploy Backend Application
        run: |
          set -e
          cd ansible
          IMG="${{ github.event.inputs.run_deploy_image }}"
          CODE="${{ github.event.inputs.run_deploy_code }}"
          INV=(--inventory inventory/production.yml --extra-vars "@/tmp/ansible_vars.json")
          if [ "$IMG" == "true" ] && [ "$CODE" == "true" ]; then
            ansible-playbook playbook_deploy_backend.yml "${INV[@]}"
          elif [ "$IMG" == "true" ]; then
            ansible-playbook playbook_deploy_backend_image.yml "${INV[@]}"
          else
            ansible-playbook playbook_deploy_backend_code.yml "${INV[@]}"
          fi

      - name: Remove extra-vars file
        if: always()
        run: rm -f /tmp/ansible_vars.json

  record_deploy_manifest:
    name: Record deploy & open PR
    needs: deploy
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout art-gallery-release-tools repository
        uses: actions/checkout@v4

      - name: Install yq (YAML processor)
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Resolve metadata and append manifest entry
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN_FOR_ART_GALLERY_BACKEND }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          RELEASE_VERSION="${{ github.event.inputs.release_version }}"
          if [ -z "$RELEASE_VERSION" ]; then
            RELEASE_VERSION="${{ vars.RELEASE_VERSION }}"
          fi
          if [ -z "$RELEASE_VERSION" ]; then
            echo "::error::RELEASE_VERSION が入力にもリポジトリ変数にもありません。"
            exit 1
          fi

          IMG="${{ github.event.inputs.run_deploy_image }}"
          CODE="${{ github.event.inputs.run_deploy_code }}"
          BACKEND_REF="${{ github.event.inputs.backend_ref }}"

          if [ "$IMG" = "true" ] && [ "$CODE" = "true" ]; then
            DEPLOY_TYPE="both"
          elif [ "$IMG" = "true" ]; then
            DEPLOY_TYPE="image"
          else
            DEPLOY_TYPE="code"
          fi

          OWNER=$(yq -r '.github_owner' ansible/group_vars/all.yml)
          REPO=$(yq -r '.service_repo_names.backend' ansible/group_vars/all.yml)
          if [ -z "$OWNER" ] || [ "$OWNER" = "null" ] || [ -z "$REPO" ] || [ "$REPO" = "null" ]; then
            echo "::error::group_vars/all.yml から github_owner / backend リポジトリ名を取得できませんでした。"
            exit 1
          fi

          resolve_sha() {
            local ref="$1"
            gh api "repos/${OWNER}/${REPO}/commits/${ref}" --jq .sha
          }

          REF_SHA=""
          IMG_SHA=""
          if [ "$CODE" = "true" ]; then
            REF_SHA=$(resolve_sha "${BACKEND_REF}")
          fi
          if [ "$IMG" = "true" ]; then
            if ! IMG_SHA=$(resolve_sha "${RELEASE_VERSION}" 2>/dev/null); then
              IMG_SHA=$(resolve_sha "refs/tags/${RELEASE_VERSION}")
            fi
          fi

          MANIFEST="backend_deploy_manifest.yml"
          jq -n \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg dt "$DEPLOY_TYPE" \
            --arg rv "$RELEASE_VERSION" \
            --arg br "$BACKEND_REF" \
            --arg rc "${REF_SHA}" \
            --arg ic "${IMG_SHA}" \
            --arg url "$RUN_URL" \
            '{
              timestamp: $ts,
              deploy_type: $dt,
              release_version: $rv,
              backend_ref: $br,
              ref_commit_sha: (if $rc == "" then null else $rc end),
              image_tag_commit_sha: (if $ic == "" then null else $ic end),
              workflow_run_url: $url
            }' | yq -P '.' > /tmp/deploy_entry.yml

          if [ ! -f "$MANIFEST" ] || ! yq -e '.backend_deployments' "$MANIFEST" &>/dev/null; then
            printf '%s\n' '---' 'backend_deployments: []' > "$MANIFEST"
          fi
          yq -i '.backend_deployments += [load("/tmp/deploy_entry.yml")]' "$MANIFEST"
          rm -f /tmp/deploy_entry.yml

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RELEASE_VERSION="${{ github.event.inputs.release_version }}"
          if [ -z "$RELEASE_VERSION" ]; then
            RELEASE_VERSION="${{ vars.RELEASE_VERSION }}"
          fi
          BRANCH="chore/backend-deploy-record-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add backend_deploy_manifest.yml
          git commit -m "chore(backend): record production deploy ${RELEASE_VERSION}"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore(backend): record production deploy ${RELEASE_VERSION}" \
            --body "Deploy workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --base "${{ github.event.repository.default_branch }}"
