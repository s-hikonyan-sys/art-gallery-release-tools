name: Deploy Backend

on:
  workflow_dispatch:
    inputs:
      run_deploy_image:
        description: '1. [デプロイ:イメージ] サーバーのイメージを更新 (Pull & Restart)'
        required: false
        type: boolean
        default: false
      run_deploy_code:
        description: '2. [デプロイ:コード] サーバーのコードと設定を更新 (Git Pull & Restart)'
        required: false
        type: boolean
        default: false
      release_version:
        description: 'GHCR ペイロード用のイメージタグ（backend_version_manifest.yml のキー。未指定時は vars.RELEASE_VERSION）'
        required: false
        type: string
      code_version:
        description: 'コードデプロイ時: backend_code_manifest.yml のキー（未指定なら backend_ref のみで取得）'
        required: false
        type: string
      backend_ref:
        description: 'code_version 未指定時の backend の ref。code_version 指定時はマニフェストが優先されます'
        required: false
        default: 'main'
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout art-gallery-release-tools repository
        uses: actions/checkout@v4

      - name: Validate Inputs
        run: |
          if [ "${{ github.event.inputs.run_deploy_image }}" != "true" ] && [ "${{ github.event.inputs.run_deploy_code }}" != "true" ]; then
            echo "::error::'run_deploy_image' または 'run_deploy_code' の少なくとも一方は 'true' に設定してください。"
            exit 1
          fi

      - name: Install yq (YAML processor)
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Set Context
        id: context
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.release_version || vars.RELEASE_VERSION }}"
          if [ -z "$VERSION" ]; then
            echo "::error::RELEASE_VERSION（入力またはリポジトリ変数）が定義されていません。"
            exit 1
          fi
          echo "RELEASE_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "BACKEND_IMAGE_TAG=${VERSION}" >> $GITHUB_ENV

          IMG="${{ github.event.inputs.run_deploy_image }}"
          CODE="${{ github.event.inputs.run_deploy_code }}"
          CODE_VERSION_INPUT="${{ github.event.inputs.code_version }}"
          BACKEND_REF_INPUT="${{ github.event.inputs.backend_ref }}"

          if [ "$IMG" = "true" ]; then
            IMG_SHA_LOOKUP=$(yq -r ".backend[\"${VERSION}\"].source_sha" backend_version_manifest.yml)
            if [ -z "$IMG_SHA_LOOKUP" ] || [ "$IMG_SHA_LOOKUP" = "null" ]; then
              echo "::error::backend_version_manifest.yml にイメージタグ ${VERSION} がありません。Build Backend のマニフェスト PR をマージしてからデプロイしてください。"
              exit 1
            fi
          fi

          BACKEND_REF="${BACKEND_REF_INPUT}"
          BACKEND_SHA=""
          echo "CODE_VERSION=${CODE_VERSION_INPUT}" >> $GITHUB_ENV
          if [ "$CODE" = "true" ]; then
            if [ -n "$CODE_VERSION_INPUT" ]; then
              CODE_REF=$(yq -r ".backend_code[\"${CODE_VERSION_INPUT}\"].source_ref" backend_code_manifest.yml)
              CODE_SHA=$(yq -r ".backend_code[\"${CODE_VERSION_INPUT}\"].source_sha" backend_code_manifest.yml)
              if [ -z "$CODE_REF" ] || [ "$CODE_REF" = "null" ] || [ -z "$CODE_SHA" ] || [ "$CODE_SHA" = "null" ]; then
                echo "::error::backend_code_manifest.yml に code_version \"${CODE_VERSION_INPUT}\" がありません。Register Backend Code の PR をマージしてからデプロイしてください。"
                exit 1
              fi
              BACKEND_REF="${CODE_REF}"
              BACKEND_SHA="${CODE_SHA}"
            fi
          fi

          echo "BACKEND_REF=${BACKEND_REF}" >> $GITHUB_ENV
          echo "BACKEND_SHA=${BACKEND_SHA}" >> $GITHUB_ENV

          GITHUB_OWNER=$(yq '.github_owner' ansible/group_vars/all.yml)
          GHCR_BASE_REGISTRY=$(yq '.ghcr_base_registry' ansible/group_vars/all.yml)
          BACKEND_REPO_NAME=$(yq '.service_repo_names.backend' ansible/group_vars/all.yml)

          if [ -z "${GITHUB_OWNER}" ] || [ -z "${GHCR_BASE_REGISTRY}" ] || [ -z "${BACKEND_REPO_NAME}" ]; then
            echo "::error::Ansibleのgroup_vars/all.ymlから変数を取得できませんでした。"
            exit 1
          fi

          echo "GITHUB_OWNER=${GITHUB_OWNER}" >> $GITHUB_ENV
          echo "BACKEND_REPO_NAME=${BACKEND_REPO_NAME}" >> $GITHUB_ENV
          echo "BACKEND_IMAGE_NAME=${GHCR_BASE_REGISTRY}/${GITHUB_OWNER}/${BACKEND_REPO_NAME}" >> $GITHUB_ENV

      - name: Install Ansible and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible jq
          ansible-galaxy collection install community.docker

      - name: Setup SSH for Production Deployment
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/ansible_deploy_key
          chmod 600 ~/.ssh/ansible_deploy_key
          echo "${{ secrets.PROD_SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Write Ansible extra-vars file
        env:
          BACKEND_REF: ${{ env.BACKEND_REF }}
          BACKEND_SHA: ${{ env.BACKEND_SHA }}
          BACKEND_IMAGE_TAG: ${{ env.BACKEND_IMAGE_TAG }}
        run: |
          set -euo pipefail
          jq -n \
            --arg ph "${{ vars.PROD_HOST }}" \
            --arg pu "${{ vars.PROD_SSH_USER }}" \
            --arg ref "$BACKEND_REF" \
            --arg tag "$BACKEND_IMAGE_TAG" \
            --arg sha "$BACKEND_SHA" \
            --arg ghb "${{ secrets.GH_TOKEN_FOR_ART_GALLERY_BACKEND }}" \
            --arg ghr "${{ secrets.GH_TOKEN_FOR_ART_GALLERY_RELEASE_TOOLS }}" \
            '{
              target_hosts: "production",
              prod_host: $ph,
              prod_ssh_user: $pu,
              prod_ssh_key_path: "~/.ssh/ansible_deploy_key",
              backend_ref: $ref,
              backend_image_tag: $tag,
              github_token_backend: $ghb,
              github_token_release_tools: $ghr
            } | if ($sha | length) > 0 then . + {backend_sha: $sha} else . end' \
            > /tmp/ansible_vars.json
          chmod 600 /tmp/ansible_vars.json

      - name: Deploy Backend Application
        run: |
          set -e
          cd ansible
          IMG="${{ github.event.inputs.run_deploy_image }}"
          CODE="${{ github.event.inputs.run_deploy_code }}"
          INV=(--inventory inventory/production.yml --extra-vars "@/tmp/ansible_vars.json")
          if [ "$IMG" == "true" ] && [ "$CODE" == "true" ]; then
            ansible-playbook playbook_deploy_backend.yml "${INV[@]}"
          elif [ "$IMG" == "true" ]; then
            ansible-playbook playbook_deploy_backend_image.yml "${INV[@]}"
          else
            ansible-playbook playbook_deploy_backend_code.yml "${INV[@]}"
          fi

      - name: Remove extra-vars file
        if: always()
        run: rm -f /tmp/ansible_vars.json

  record_deploy_manifest:
    name: Record deploy & open PR
    needs: deploy
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout art-gallery-release-tools repository
        uses: actions/checkout@v4

      - name: Install yq (YAML processor)
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Resolve metadata and append manifest entry
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_TOKEN: ${{ secrets.GH_TOKEN_FOR_ART_GALLERY_BACKEND }}
        run: |
          set -euo pipefail

          RELEASE_VERSION="${{ github.event.inputs.release_version }}"
          if [ -z "$RELEASE_VERSION" ]; then
            RELEASE_VERSION="${{ vars.RELEASE_VERSION }}"
          fi
          if [ -z "$RELEASE_VERSION" ]; then
            echo "::error::RELEASE_VERSION が入力にもリポジトリ変数にもありません。"
            exit 1
          fi

          IMG="${{ github.event.inputs.run_deploy_image }}"
          CODE="${{ github.event.inputs.run_deploy_code }}"
          CODE_VERSION="${{ github.event.inputs.code_version }}"
          BACKEND_REF="${{ github.event.inputs.backend_ref }}"

          if [ "$IMG" = "true" ] && [ "$CODE" = "true" ]; then
            DEPLOY_TYPE="both"
          elif [ "$IMG" = "true" ]; then
            DEPLOY_TYPE="image"
          else
            DEPLOY_TYPE="code"
          fi

          OWNER=$(yq -r '.github_owner' ansible/group_vars/all.yml)
          REPO=$(yq -r '.service_repo_names.backend' ansible/group_vars/all.yml)

          REF_SHA=""
          if [ "$CODE" = "true" ]; then
            if [ -n "$CODE_VERSION" ]; then
              REF_SHA=$(yq -r ".backend_code[\"${CODE_VERSION}\"].source_sha" backend_code_manifest.yml)
              [ "$REF_SHA" = "null" ] && REF_SHA=""
            fi
            if [ -z "$REF_SHA" ]; then
              REF_SHA=$(git ls-remote \
                "https://x-access-token:${GH_TOKEN}@github.com/${OWNER}/${REPO}.git" \
                "${BACKEND_REF}" | awk 'NR==1{print $1}')
            fi
          fi

          IMG_SHA=""
          if [ "$IMG" = "true" ]; then
            IMG_SHA=$(yq -r ".backend[\"${RELEASE_VERSION}\"].source_sha" backend_version_manifest.yml)
            if [ "$IMG_SHA" = "null" ]; then IMG_SHA=""; fi
          fi

          MANIFEST="backend_deploy_manifest.yml"
          jq -n \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg dt "$DEPLOY_TYPE" \
            --arg rv "$RELEASE_VERSION" \
            --arg cv "$CODE_VERSION" \
            --arg br "$BACKEND_REF" \
            --arg rc "${REF_SHA}" \
            --arg ic "${IMG_SHA}" \
            --arg url "$RUN_URL" \
            '{
              timestamp: $ts,
              deploy_type: $dt,
              release_version: $rv,
              code_version: (if $cv == "" then null else $cv end),
              backend_ref: $br,
              ref_commit_sha: (if $rc == "" then null else $rc end),
              image_source_sha: (if $ic == "" then null else $ic end),
              workflow_run_url: $url
            }' | yq -P '.' > /tmp/deploy_entry.yml

          if [ ! -f "$MANIFEST" ] || ! yq -e '.backend_deployments' "$MANIFEST" &>/dev/null; then
            printf '%s\n' '---' 'backend_deployments: []' > "$MANIFEST"
          fi
          yq -i '.backend_deployments += [load("/tmp/deploy_entry.yml")]' "$MANIFEST"
          rm -f /tmp/deploy_entry.yml

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RELEASE_VERSION="${{ github.event.inputs.release_version }}"
          if [ -z "$RELEASE_VERSION" ]; then
            RELEASE_VERSION="${{ vars.RELEASE_VERSION }}"
          fi
          CV="${{ github.event.inputs.code_version }}"
          BRANCH="chore/backend-deploy-record-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add backend_deploy_manifest.yml
          git commit -m "chore(backend): record production deploy ${RELEASE_VERSION}"
          git push origin "$BRANCH"
          BODY_FILE=$(mktemp)
          {
            echo "Deploy workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "- release_version: \`${RELEASE_VERSION}\`"
            echo "- code_version: \`${CV:-"(none)"}\`"
          } > "$BODY_FILE"
          gh pr create \
            --title "chore(backend): record production deploy ${RELEASE_VERSION}" \
            --body-file "$BODY_FILE" \
            --base "${{ github.event.repository.default_branch }}"
          rm -f "$BODY_FILE"
