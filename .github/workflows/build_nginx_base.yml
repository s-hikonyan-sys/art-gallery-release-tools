name: Build Nginx Base Image (nginx + SiteGuard)

# nginx-siteguard-base イメージをビルドする（2層イメージ戦略のLayer 1）。
# Ubuntu 22.04 + nginx (ソースビルド) + SiteGuard WAF モジュールを含む。
#
# バージョン形式: v{nginx_version}-sg{siteguard_version}
#   例: v1.26.3-sg8.00-3 (nginx 1.26.3 + SiteGuard 8.00 Update3)
#
# 実行タイミング:
#   - nginx 本体バージョンアップ時
#   - SiteGuard バージョンアップ時（要: setup_siteguard_package.yml を先に実行）
#
# 実行後: build_nginx.yml で base_version に本ワークフローのタグを指定してビルドする。

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'ベースイメージタグ（形式: v{nginx}-sg{siteguard}、例: v1.26.3-sg8.00-3）'
        required: true
        type: string
      nginx_version:
        description: 'ビルドする nginx のバージョン（例: 1.26.3）'
        required: true
        default: '1.26.3'
        type: string
      siteguard_version:
        description: 'SiteGuard のバージョン文字列（例: 8.00-3）。パッケージファイル名に使用'
        required: true
        default: '8.00-3'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write

    steps:
      - name: Checkout art-gallery-release-tools repository
        uses: actions/checkout@v4

      - name: Install yq (YAML processor)
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Set Context
        run: |
          VERSION="${{ github.event.inputs.release_version }}"
          if [ -z "$VERSION" ]; then
            echo "::error::release_version が指定されていません。形式: v{nginx_version}-sg{siteguard_version}"
            exit 1
          fi
          echo "NGINX_BASE_IMAGE_TAG=${VERSION}" >> $GITHUB_ENV
          echo "NGINX_VERSION=${{ github.event.inputs.nginx_version }}" >> $GITHUB_ENV
          SITEGUARD_PKG="siteguard-server-edition-${{ github.event.inputs.siteguard_version }}.nginx.x86_64.tar.gz"
          echo "SITEGUARD_PKG=${SITEGUARD_PKG}" >> $GITHUB_ENV

          GITHUB_OWNER=$(yq '.github_owner' ansible/group_vars/all.yml)
          GHCR_BASE_REGISTRY=$(yq '.ghcr_base_registry' ansible/group_vars/all.yml)
          NGINX_BASE_REPO=$(yq '.nginx_base_image_repo' ansible/group_vars/all.yml)

          if [ -z "${GITHUB_OWNER}" ] || [ -z "${GHCR_BASE_REGISTRY}" ] || [ -z "${NGINX_BASE_REPO}" ]; then
            echo "::error::Ansibleのgroup_vars/all.ymlから変数を取得できませんでした。"
            exit 1
          fi

          echo "NGINX_BASE_IMAGE_NAME=${GHCR_BASE_REGISTRY}/${GITHUB_OWNER}/${NGINX_BASE_REPO}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download SiteGuard package from GitHub Release
        run: |
          gh release download siteguard-packages \
            --repo "${{ github.repository }}" \
            --pattern "${{ env.SITEGUARD_PKG }}" \
            --dir ansible/roles/nginx/internal/
          echo "SiteGuard package downloaded: ansible/roles/nginx/internal/${{ env.SITEGUARD_PKG }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Ansible and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
          ansible-galaxy collection install community.docker

      - name: Build nginx-siteguard-base image with Ansible
        run: |
          cd ansible
          ansible-playbook playbook_build_nginx_base.yml \
            --inventory inventory/ci.yml \
            --extra-vars "{
              \"target_hosts\":\"ci-server\",
              \"nginx_base_image_tag\":\"${{ env.NGINX_BASE_IMAGE_TAG }}\",
              \"nginx_version\":\"${{ env.NGINX_VERSION }}\",
              \"siteguard_pkg_filename\":\"${{ env.SITEGUARD_PKG }}\"
            }" \
            --tags "build-nginx-base"

      - name: Push nginx-siteguard-base image to GHCR
        run: |
          docker push ${{ env.NGINX_BASE_IMAGE_NAME }}:${{ env.NGINX_BASE_IMAGE_TAG }}

      - name: Cleanup SiteGuard package from runner
        if: always()
        run: rm -f "ansible/roles/nginx/internal/${{ env.SITEGUARD_PKG }}"

      - name: Create PR for nginx-base manifest update
        uses: ./.github/actions/create-build-manifest-pr
        with:
          token: ${{ secrets.GH_TOKEN_FOR_ART_GALLERY_RELEASE_TOOLS }}
          manifest_path: manifest/nginx/base/nginx_base_version_manifest.yml
          service_name: nginx_base
          image_tag: ${{ env.NGINX_BASE_IMAGE_TAG }}
          source_ref: "nginx-${{ github.event.inputs.nginx_version }}_sg-${{ github.event.inputs.siteguard_version }}"
          source_sha: ${{ github.sha }}
          image_full_name: ${{ env.NGINX_BASE_IMAGE_NAME }}
          build_run_id: ${{ github.run_id }}
          build_workflow: ${{ github.workflow }}
          base_branch: ${{ github.event.repository.default_branch }}
