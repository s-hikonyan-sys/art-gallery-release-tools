name: Deploy Frontend

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'デプロイ対象のリリースバージョン (例: v1.0.0。未指定時はリポジトリ変数を参照)'
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout art-gallery-release-tools repository
        uses: actions/checkout@v4

      - name: Set Context
        id: context
        run: |
          VERSION="${{ github.event.inputs.release_version || vars.RELEASE_VERSION }}"
          if [ -z "$VERSION" ]; then
            echo "::error::RELEASE_VERSION が定義されていません。"
            exit 1
          fi
          echo "RELEASE_VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Download Frontend Artifact (runner-side)
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ env.RELEASE_VERSION }}
          path: /tmp/frontend-dist

      - name: Create Frontend Artifact ZIP (runner-side)
        run: |
          python3 - <<'PY'
          import os
          import zipfile

          src_dir = "/tmp/frontend-dist"
          zip_path = "/tmp/frontend-dist.zip"

          if not os.path.isdir(src_dir):
            raise SystemExit(f"missing artifact dir: {src_dir}")

          with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as zf:
            for root, _, files in os.walk(src_dir):
              for f in files:
                full = os.path.join(root, f)
                rel = os.path.relpath(full, src_dir)
                zf.write(full, rel)

          print(f"wrote: {zip_path}")
          PY

      - name: Install Ansible and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Setup SSH for Production Deployment
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/ansible_deploy_key
          chmod 600 ~/.ssh/ansible_deploy_key
          echo "${{ secrets.PROD_SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Write Ansible extra-vars file
        run: |
          cat > /tmp/ansible_vars.json << 'VARS_EOF'
          {
            "target_hosts": "production",
            "prod_host": "${{ vars.PROD_HOST }}",
            "prod_ssh_user": "${{ vars.PROD_SSH_USER }}",
            "prod_ssh_key_path": "~/.ssh/ansible_deploy_key",
            "frontend_artifact_zip_local": "/tmp/frontend-dist.zip"
          }
          VARS_EOF
          chmod 600 /tmp/ansible_vars.json

      - name: Deploy Frontend
        run: |
          cd ansible
          ansible-playbook playbook_deploy_frontend.yml \
            --inventory inventory/production.yml \
            --extra-vars "@/tmp/ansible_vars.json" \
            --tags "deploy-frontend,reload-nginx"

      - name: Remove extra-vars file
        if: always()
        run: rm -f /tmp/ansible_vars.json
