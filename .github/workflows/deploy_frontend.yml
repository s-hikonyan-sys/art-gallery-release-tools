name: Deploy Frontend

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'デプロイ対象のリリースバージョン (例: v1.0.0。未指定時はリポジトリ変数を参照)'
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout art-gallery-release-tools repository
        uses: actions/checkout@v4

      - name: Set Context
        id: context
        run: |
          VERSION="${{ github.event.inputs.release_version || vars.RELEASE_VERSION }}"
          if [ -z "$VERSION" ]; then
            echo "::error::RELEASE_VERSION が定義されていません。"
            exit 1
          fi
          echo "RELEASE_VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Resolve Frontend Artifact ID from release_version
        env:
          GH_TOKEN_FRONTEND: ${{ secrets.GH_TOKEN_FOR_ART_GALLERY_RELEASE_TOOLS }}
          GITHUB_OWNER: s-hikonyan-sys
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          set -euo pipefail

          ARTIFACT_NAME="frontend-dist-${RELEASE_VERSION}"
          API_URL="https://api.github.com/repos/${GITHUB_OWNER}/art-gallery-release-tools/actions/artifacts?name=${ARTIFACT_NAME}&per_page=100"

          ARTIFACT_ID=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN_FRONTEND}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${API_URL}" | python3 -c "import json,sys; d=json.load(sys.stdin); a=[x for x in d.get('artifacts',[]) if not x.get('expired',False)]; print(a[0]['id'] if a else '')")

          if [ -z "${ARTIFACT_ID}" ]; then
            echo "::error::Artifact '${ARTIFACT_NAME}' が見つかりません。release-tools の build_frontend.yml で同じバージョンをビルドしてください。"
            exit 1
          fi

          echo "FRONTEND_ARTIFACT_ID=${ARTIFACT_ID}" >> "$GITHUB_ENV"

      - name: Install Ansible and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Setup SSH for Production Deployment
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/ansible_deploy_key
          chmod 600 ~/.ssh/ansible_deploy_key
          echo "${{ secrets.PROD_SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Write WAF paths file (gitignored)
        run: |
          cat > ansible/group_vars/waf_paths.yml << 'PATHS_EOF'
          ---
          waf_install_dir: "${{ secrets.WAF_INSTALL_DIR }}"
          waf_conf_container_path: "${{ secrets.WAF_CONF_CONTAINER_PATH }}"
          waf_data_container_path: "${{ secrets.WAF_DATA_CONTAINER_PATH }}"
          waf_main_conf_filename: "${{ secrets.WAF_MAIN_CONF_FILENAME }}"
          waf_update_conf_filename: "${{ secrets.WAF_UPDATE_CONF_FILENAME }}"
          PATHS_EOF
          chmod 600 ansible/group_vars/waf_paths.yml

      - name: Write Ansible extra-vars file
        run: |
          cat > /tmp/ansible_vars.json << 'VARS_EOF'
          {
            "target_hosts": "production",
            "prod_host": "${{ vars.PROD_HOST }}",
            "prod_ssh_user": "${{ vars.PROD_SSH_USER }}",
            "prod_ssh_key_path": "~/.ssh/ansible_deploy_key",
            "frontend_artifact_id": "${{ env.FRONTEND_ARTIFACT_ID }}",
            "frontend_artifact_repo": "art-gallery-release-tools",
            "github_token_frontend": "${{ secrets.GH_TOKEN_FOR_ART_GALLERY_RELEASE_TOOLS }}"
          }
          VARS_EOF
          chmod 600 /tmp/ansible_vars.json

      - name: Deploy Frontend
        run: |
          cd ansible
          ansible-playbook playbook_deploy_frontend.yml \
            --inventory inventory/production.yml \
            --extra-vars "@/tmp/ansible_vars.json" \
            --tags "deploy-frontend,reload-nginx"

      - name: Remove sensitive files
        if: always()
        run: |
          rm -f /tmp/ansible_vars.json
          rm -f ansible/group_vars/waf_paths.yml
