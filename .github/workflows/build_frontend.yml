name: Build Frontend

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'ビルドするイメージのタグ (例: v1.0.0。未指定時はリポジトリ変数を参照)'
        required: false
        type: string
      frontend_ref:
        description: 'ビルド対象の frontend リポジトリの ref (branch/tag/sha)'
        required: false
        default: 'main'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Resolve Context
        id: context
        run: |
          BUILD_VERSION="${{ github.event.inputs.release_version || vars.RELEASE_VERSION }}"
          if [ -z "$BUILD_VERSION" ]; then
            echo "::error::RELEASE_VERSION が定義されていません。"
            exit 1
          fi

          CHECKOUT_REF="${{ github.event.inputs.frontend_ref }}"
          if [ -z "$CHECKOUT_REF" ]; then
            CHECKOUT_REF="main"
          fi

          echo "RELEASE_VERSION=${BUILD_VERSION}" >> "$GITHUB_ENV"
          echo "FRONTEND_REF=${CHECKOUT_REF}" >> "$GITHUB_ENV"

      - name: Checkout frontend repository
        uses: actions/checkout@v4
        with:
          repository: s-hikonyan-sys/art-gallery-frontend
          ref: ${{ env.FRONTEND_REF }}
          token: ${{ secrets.GH_TOKEN_FOR_ART_GALLERY_FRONTEND }}

      - name: Capture frontend source commit
        run: |
          echo "FRONTEND_SOURCE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint check
        run: npm run lint:check

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build

      - name: Upload versioned dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ env.RELEASE_VERSION }}
          path: dist/
          retention-days: 30

      - name: Checkout release-tools repository for local action
        uses: actions/checkout@v4
        with:
          repository: s-hikonyan-sys/art-gallery-release-tools
          ref: main
          token: ${{ secrets.GH_TOKEN_FOR_ART_GALLERY_RELEASE_TOOLS }}

      - name: Create PR for frontend manifest update
        uses: ./.github/actions/create-build-manifest-pr
        with:
          token: ${{ secrets.GH_TOKEN_FOR_ART_GALLERY_RELEASE_TOOLS }}
          manifest_path: manifest/frontend/image/frontend_version_manifest.yml
          service_name: frontend
          image_tag: ${{ env.RELEASE_VERSION }}
          source_ref: ${{ env.FRONTEND_REF }}
          source_sha: ${{ env.FRONTEND_SOURCE_SHA }}
          artifact_name: frontend-dist-${{ env.RELEASE_VERSION }}
          build_run_id: ${{ github.run_id }}
          build_workflow: ${{ github.workflow }}
          base_branch: ${{ github.event.repository.default_branch }}
