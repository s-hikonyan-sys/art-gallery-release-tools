name: Build Backend Image

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'ビルドするイメージのタグ (例: v1.0.0。未指定時はリポジトリ変数を参照)'
        required: false
        type: string
      backend_ref:
        description: 'ビルド対象の backend リポジトリの ref (branch/tag/sha)'
        required: false
        default: 'main'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # GHCRへのプッシュのため

    steps:
      - name: Checkout art-gallery-release-tools repository
        uses: actions/checkout@v4

      - name: Install yq (YAML processor)
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Set Context
        run: |
          VERSION="${{ github.event.inputs.release_version || vars.RELEASE_VERSION }}"
          if [ -z "$VERSION" ]; then
            echo "::error::RELEASE_VERSION が定義されていません。"
            exit 1
          fi
          echo "BACKEND_IMAGE_TAG=${VERSION}" >> $GITHUB_ENV
          echo "BACKEND_REF=${{ github.event.inputs.backend_ref }}" >> $GITHUB_ENV

          BACKEND_SOURCE_SHA=$(git ls-remote "https://x-access-token:${{ secrets.GH_TOKEN_FOR_ART_GALLERY_BACKEND }}@github.com/s-hikonyan-sys/art-gallery-backend.git" "${{ github.event.inputs.backend_ref }}" | awk 'NR==1{print $1}')
          if [ -z "$BACKEND_SOURCE_SHA" ]; then
            echo "::error::backend_ref からコミットSHAを解決できませんでした。"
            exit 1
          fi
          echo "BACKEND_SOURCE_SHA=${BACKEND_SOURCE_SHA}" >> $GITHUB_ENV
          
          # Ansibleのgroup_vars/all.ymlから変数を取得
          GITHUB_OWNER=$(yq '.github_owner' ansible/group_vars/all.yml)
          GHCR_BASE_REGISTRY=$(yq '.ghcr_base_registry' ansible/group_vars/all.yml)
          BACKEND_REPO_NAME=$(yq '.service_repo_names.backend' ansible/group_vars/all.yml)
          
          if [ -z "${GITHUB_OWNER}" ] || [ -z "${GHCR_BASE_REGISTRY}" ] || [ -z "${BACKEND_REPO_NAME}" ]; then
            echo "::error::Ansibleのgroup_vars/all.ymlから変数を取得できませんでした。"
            exit 1
          fi
          
          echo "BACKEND_IMAGE_NAME=${GHCR_BASE_REGISTRY}/${GITHUB_OWNER}/${BACKEND_REPO_NAME}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Ansible and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
          ansible-galaxy collection install community.docker

      - name: Build and Push Backend Image with Ansible
        run: |
          cd ansible
          ansible-playbook playbook_build_backend.yml \
            --inventory inventory/ci.yml \
            --extra-vars '{"target_hosts":"ci-server", "backend_image_tag":"${{ env.BACKEND_IMAGE_TAG }}"}' \
            --tags "build-backend"
          
          docker push ${{ env.BACKEND_IMAGE_NAME }}:${{ env.BACKEND_IMAGE_TAG }}

      - name: Create PR for backend manifest update
        uses: ./.github/actions/create-build-manifest-pr
        with:
          token: ${{ secrets.GH_TOKEN_FOR_ART_GALLERY_RELEASE_TOOLS }}
          manifest_path: manifest/backend/image/backend_version_manifest.yml
          service_name: backend
          image_tag: ${{ env.BACKEND_IMAGE_TAG }}
          source_ref: ${{ env.BACKEND_REF }}
          source_sha: ${{ env.BACKEND_SOURCE_SHA }}
          image_full_name: ${{ env.BACKEND_IMAGE_NAME }}
          build_run_id: ${{ github.run_id }}
          build_workflow: ${{ github.workflow }}
          base_branch: ${{ github.event.repository.default_branch }}
