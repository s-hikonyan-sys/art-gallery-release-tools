name: Deploy Nginx

on:
  workflow_dispatch:
    inputs:
      run_deploy_code:
        description: '1. [デプロイ:設定] nginxの設定ファイルを更新 (Git Pull & Deploy)'
        required: false
        type: boolean
        default: false
      run_deploy_image:
        description: '2. [デプロイ:イメージ] nginxコンテナのイメージを更新 (Pull & Recreate)'
        required: false
        type: boolean
        default: false
      run_setup_siteguard:
        description: '3. [初回のみ] SiteGuard初期設定 (ライセンス登録・シグネチャURL・初回シグネチャ更新)'
        required: false
        type: boolean
        default: false
      release_version:
        description: 'デプロイ対象のリリースバージョン (例: v1.0.0。未指定時はリポジトリ変数を参照)'
        required: false
        type: string
      nginx_ref:
        description: 'デプロイする nginx リポジトリの ref (branch/tag/sha)'
        required: false
        default: 'main'
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout art-gallery-release-tools repository
        uses: actions/checkout@v4

      - name: Set Context
        id: context
        run: |
          VERSION="${{ github.event.inputs.release_version || vars.RELEASE_VERSION }}"
          if [ -z "$VERSION" ]; then
            echo "::error::RELEASE_VERSION が定義されていません。"
            exit 1
          fi
          echo "RELEASE_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "NGINX_REF=${{ github.event.inputs.nginx_ref }}" >> $GITHUB_ENV

      - name: Install Ansible and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
          ansible-galaxy collection install community.docker

      - name: Validate Inputs
        run: |
          if [ "${{ github.event.inputs.run_deploy_code }}" != "true" ] && \
             [ "${{ github.event.inputs.run_deploy_image }}" != "true" ] && \
             [ "${{ github.event.inputs.run_setup_siteguard }}" != "true" ]; then
            echo "::error::'run_deploy_code' / 'run_deploy_image' / 'run_setup_siteguard' の少なくとも一つを 'true' に設定してください。"
            exit 1
          fi

      - name: Setup SSH for Production Deployment
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/ansible_deploy_key
          chmod 600 ~/.ssh/ansible_deploy_key
          echo "${{ secrets.PROD_SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Write Ansible extra-vars file
        run: |
          cat > /tmp/ansible_vars.json << 'VARS_EOF'
          {
            "target_hosts": "production",
            "prod_host": "${{ vars.PROD_HOST }}",
            "prod_ssh_user": "${{ vars.PROD_SSH_USER }}",
            "prod_ssh_key_path": "~/.ssh/ansible_deploy_key",
            "nginx_ref": "${{ github.event.inputs.nginx_ref }}",
            "nginx_image_tag": "${{ github.event.inputs.release_version || vars.RELEASE_VERSION }}",
            "github_token_nginx": "${{ secrets['GH_TOKEN_FOR_ART_GALLERY_NGINX'] }}",
            "siteguard_serial_key": "${{ secrets.SITEGUARD_SERIAL_KEY }}",
            "siteguard_support_id": "${{ secrets.SITEGUARD_SUPPORT_ID }}",
            "siteguard_password": "${{ secrets.SITEGUARD_PASSWORD }}"
          }
          VARS_EOF
          chmod 600 /tmp/ansible_vars.json

      - name: Deploy Nginx Configuration
        run: |
          cd ansible

          TAGS=""
          if [ "${{ github.event.inputs.run_deploy_code }}" == "true" ]; then
            TAGS="deploy-nginx"
          fi

          if [ "${{ github.event.inputs.run_deploy_image }}" == "true" ]; then
            [ -n "$TAGS" ] && TAGS="$TAGS,"
            TAGS="${TAGS}deploy-compose,update-nginx-image"
          fi

          if [ "${{ github.event.inputs.run_setup_siteguard }}" == "true" ]; then
            [ -n "$TAGS" ] && TAGS="$TAGS,"
            TAGS="${TAGS}setup-siteguard"
          fi

          if [ -z "$TAGS" ]; then
            echo "::error::デプロイのオプションが選択されていません"
            exit 1
          fi

          ansible-playbook playbook_deploy_nginx.yml \
            --inventory inventory/production.yml \
            --extra-vars "@/tmp/ansible_vars.json" \
            --tags "$TAGS"

      - name: Remove extra-vars file
        if: always()
        run: rm -f /tmp/ansible_vars.json
