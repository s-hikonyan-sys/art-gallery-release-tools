name: Deploy Nginx

on:
  workflow_dispatch:
    inputs:
      run_deploy_code:
        description: '1. [デプロイ:設定] nginxの設定ファイルを更新 (Git Pull & Deploy)'
        required: false
        type: boolean
        default: false
      run_deploy_image:
        description: '2. [デプロイ:イメージ] nginxコンテナのイメージを更新 (Pull & Recreate)'
        required: false
        type: boolean
        default: false
      run_setup_waf:
        description: '3. [初回のみ] WAF初期設定 (ライセンス登録・シグネチャURL・初回シグネチャ更新)'
        required: false
        type: boolean
        default: false
      release_version:
        description: 'デプロイ対象のリリースバージョン (例: v1.0.0。未指定時はリポジトリ変数を参照)'
        required: false
        type: string
      code_version:
        description: 'コードデプロイ時: manifest/nginx/code/nginx_code_manifest.yml のキー（未指定なら nginx_ref のみで取得）'
        required: false
        type: string
      nginx_ref:
        description: 'デプロイする nginx リポジトリの ref (branch/tag/sha)'
        required: false
        default: 'main'
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      MANIFEST_NGINX_IMAGE: manifest/nginx/image/nginx_version_manifest.yml
      MANIFEST_NGINX_CODE: manifest/nginx/code/nginx_code_manifest.yml
      MANIFEST_NGINX_DEPLOY: manifest/nginx/deploy/nginx_deploy_manifest.yml

    steps:
      - name: Checkout art-gallery-release-tools repository
        uses: actions/checkout@v4

      - name: Install yq (YAML processor)
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Set Context
        id: context
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.release_version || vars.RELEASE_VERSION }}"
          if [ -z "$VERSION" ]; then
            echo "::error::RELEASE_VERSION が定義されていません。"
            exit 1
          fi
          IMG="${{ github.event.inputs.run_deploy_image }}"
          CODE="${{ github.event.inputs.run_deploy_code }}"
          CODE_VERSION_INPUT="${{ github.event.inputs.code_version }}"
          NGINX_REF_INPUT="${{ github.event.inputs.nginx_ref }}"

          if [ "$IMG" = "true" ]; then
            IMG_SHA_LOOKUP=$(yq -r ".nginx[\"${VERSION}\"].source_sha" "$MANIFEST_NGINX_IMAGE")
            if [ -z "$IMG_SHA_LOOKUP" ] || [ "$IMG_SHA_LOOKUP" = "null" ]; then
              echo "::error::${MANIFEST_NGINX_IMAGE} にイメージタグ ${VERSION} がありません。Build Nginx のマニフェスト PR をマージしてからデプロイしてください。"
              exit 1
            fi
          fi

          NGINX_REF="${NGINX_REF_INPUT}"
          if [ "$CODE" = "true" ] && [ -n "$CODE_VERSION_INPUT" ]; then
            CODE_REF=$(yq -r ".nginx_code[\"${CODE_VERSION_INPUT}\"].source_ref" "$MANIFEST_NGINX_CODE")
            CODE_SHA=$(yq -r ".nginx_code[\"${CODE_VERSION_INPUT}\"].source_sha" "$MANIFEST_NGINX_CODE")
            if [ -z "$CODE_REF" ] || [ "$CODE_REF" = "null" ] || [ -z "$CODE_SHA" ] || [ "$CODE_SHA" = "null" ]; then
              echo "::error::${MANIFEST_NGINX_CODE} に code_version \"${CODE_VERSION_INPUT}\" がありません。Register Nginx Code の PR をマージしてからデプロイしてください。"
              exit 1
            fi
            NGINX_REF="${CODE_REF}"
          fi

          echo "RELEASE_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "NGINX_REF=${NGINX_REF}" >> $GITHUB_ENV
          echo "CODE_VERSION=${CODE_VERSION_INPUT}" >> $GITHUB_ENV

      - name: Install Ansible and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible jq
          ansible-galaxy collection install community.docker

      - name: Validate Inputs
        run: |
          if [ "${{ github.event.inputs.run_deploy_code }}" != "true" ] && \
             [ "${{ github.event.inputs.run_deploy_image }}" != "true" ] && \
             [ "${{ github.event.inputs.run_setup_waf }}" != "true" ]; then
            echo "::error::'run_deploy_code' / 'run_deploy_image' / 'run_setup_waf' の少なくとも一つを 'true' に設定してください。"
            exit 1
          fi

      - name: Setup SSH for Production Deployment
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/ansible_deploy_key
          chmod 600 ~/.ssh/ansible_deploy_key
          echo "${{ secrets.PROD_SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Write WAF paths file (gitignored)
        run: |
          cat > ansible/group_vars/waf_paths.yml << 'PATHS_EOF'
          ---
          waf_install_dir: "${{ secrets.WAF_INSTALL_DIR }}"
          waf_conf_container_path: "${{ secrets.WAF_CONF_CONTAINER_PATH }}"
          waf_data_container_path: "${{ secrets.WAF_DATA_CONTAINER_PATH }}"
          waf_main_conf_filename: "${{ secrets.WAF_MAIN_CONF_FILENAME }}"
          waf_update_conf_filename: "${{ secrets.WAF_UPDATE_CONF_FILENAME }}"
          PATHS_EOF
          chmod 600 ansible/group_vars/waf_paths.yml

      - name: Write Ansible extra-vars file
        run: |
          cat > /tmp/ansible_vars.json << 'VARS_EOF'
          {
            "target_hosts": "production",
            "prod_host": "${{ vars.PROD_HOST }}",
            "prod_ssh_user": "${{ vars.PROD_SSH_USER }}",
            "prod_ssh_key_path": "~/.ssh/ansible_deploy_key",
            "nginx_ref": "${{ env.NGINX_REF }}",
            "nginx_image_tag": "${{ github.event.inputs.release_version || vars.RELEASE_VERSION }}",
            "github_token_nginx": "${{ secrets['GH_TOKEN_FOR_ART_GALLERY_NGINX'] }}",
            "waf_serial_key": "${{ secrets.WAF_SERIAL_KEY }}",
            "waf_support_id": "${{ secrets.WAF_SUPPORT_ID }}",
            "waf_password": "${{ secrets.WAF_PASSWORD }}"
          }
          VARS_EOF
          chmod 600 /tmp/ansible_vars.json

      - name: Deploy Nginx Configuration
        run: |
          cd ansible

          TAGS=""
          if [ "${{ github.event.inputs.run_deploy_code }}" == "true" ]; then
            TAGS="deploy-nginx"
          fi

          if [ "${{ github.event.inputs.run_deploy_image }}" == "true" ]; then
            [ -n "$TAGS" ] && TAGS="$TAGS,"
            TAGS="${TAGS}deploy-compose,update-nginx-image"
          fi

          if [ "${{ github.event.inputs.run_setup_waf }}" == "true" ]; then
            [ -n "$TAGS" ] && TAGS="$TAGS,"
            TAGS="${TAGS}setup-waf"
          fi

          if [ -z "$TAGS" ]; then
            echo "::error::デプロイのオプションが選択されていません"
            exit 1
          fi

          ansible-playbook playbook_deploy_nginx.yml \
            --inventory inventory/production.yml \
            --extra-vars "@/tmp/ansible_vars.json" \
            --tags "$TAGS"

      - name: Append nginx deploy manifest entry
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_TOKEN: ${{ secrets.GH_TOKEN_FOR_ART_GALLERY_NGINX }}
        run: |
          set -euo pipefail
          IMG="${{ github.event.inputs.run_deploy_image }}"
          CODE="${{ github.event.inputs.run_deploy_code }}"
          CODE_VERSION="${{ env.CODE_VERSION }}"
          NGINX_REF="${{ env.NGINX_REF }}"
          RELEASE_VERSION="${{ env.RELEASE_VERSION }}"

          if [ "$IMG" = "true" ] && [ "$CODE" = "true" ]; then
            DEPLOY_TYPE="both"
          elif [ "$IMG" = "true" ]; then
            DEPLOY_TYPE="image"
          else
            DEPLOY_TYPE="code"
          fi

          OWNER=$(yq -r '.github_owner' ansible/group_vars/all.yml)
          REPO=$(yq -r '.service_repo_names.nginx' ansible/group_vars/all.yml)

          REF_SHA=""
          if [ "$CODE" = "true" ]; then
            if [ -n "$CODE_VERSION" ]; then
              REF_SHA=$(yq -r ".nginx_code[\"${CODE_VERSION}\"].source_sha" "$MANIFEST_NGINX_CODE")
              [ "$REF_SHA" = "null" ] && REF_SHA=""
            fi
            if [ -z "$REF_SHA" ]; then
              REF_SHA=$(git ls-remote \
                "https://x-access-token:${GH_TOKEN}@github.com/${OWNER}/${REPO}.git" \
                "${NGINX_REF}" | awk 'NR==1{print $1}')
            fi
          fi

          IMG_SHA=""
          if [ "$IMG" = "true" ]; then
            IMG_SHA=$(yq -r ".nginx[\"${RELEASE_VERSION}\"].source_sha" "$MANIFEST_NGINX_IMAGE")
            [ "$IMG_SHA" = "null" ] && IMG_SHA=""
          fi

          jq -n \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg dt "$DEPLOY_TYPE" \
            --arg rv "$RELEASE_VERSION" \
            --arg cv "$CODE_VERSION" \
            --arg nr "$NGINX_REF" \
            --arg rc "${REF_SHA}" \
            --arg ic "${IMG_SHA}" \
            --arg url "$RUN_URL" \
            '{
              timestamp: $ts,
              deploy_type: $dt,
              release_version: $rv,
              code_version: (if $cv == "" then null else $cv end),
              nginx_ref: $nr,
              ref_commit_sha: (if $rc == "" then null else $rc end),
              image_source_sha: (if $ic == "" then null else $ic end),
              workflow_run_url: $url
            }' | yq -P '.' > /tmp/deploy_entry.yml

          if [ ! -f "$MANIFEST_NGINX_DEPLOY" ] || ! yq -e '.nginx_deployments' "$MANIFEST_NGINX_DEPLOY" &>/dev/null; then
            printf '%s\n' '---' 'nginx_deployments: []' > "$MANIFEST_NGINX_DEPLOY"
          fi
          yq -i '.nginx_deployments += [load("/tmp/deploy_entry.yml")]' "$MANIFEST_NGINX_DEPLOY"
          rm -f /tmp/deploy_entry.yml

      - name: Create pull request for deploy record
        uses: ./.github/actions/create-deploy-manifest-pr
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          manifest_path: ${{ env.MANIFEST_NGINX_DEPLOY }}
          service_name: nginx
          release_version: ${{ env.RELEASE_VERSION }}
          code_version: ${{ env.CODE_VERSION }}
          base_branch: ${{ github.event.repository.default_branch }}

      - name: Remove sensitive files
        if: always()
        run: |
          rm -f /tmp/ansible_vars.json
          rm -f ansible/group_vars/waf_paths.yml
