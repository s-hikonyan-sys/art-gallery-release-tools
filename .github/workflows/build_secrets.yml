name: Build Secrets API Image

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'ビルドするイメージのタグ (例: v1.0.0。未指定時はリポジトリ変数を参照)'
        required: false
        type: string
      secrets_ref:
        description: 'ビルド対象の secrets リポジトリの ref (branch/tag/sha)'
        required: false
        default: 'main'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: { contents: write, packages: write, pull-requests: write }

    steps:
      - name: Checkout art-gallery-release-tools repository
        uses: actions/checkout@v4

      - name: Install yq (YAML processor)
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Set Context
        run: |
          VERSION="${{ github.event.inputs.release_version || vars.RELEASE_VERSION }}"
          if [ -z "$VERSION" ]; then
            echo "::error::RELEASE_VERSION が定義されていません。"
            exit 1
          fi
          echo "SECRETS_IMAGE_TAG=${VERSION}" >> $GITHUB_ENV
          
          # Ansibleのgroup_vars/all.ymlから変数を取得
          GITHUB_OWNER=$(yq '.github_owner' ansible/group_vars/all.yml)
          GHCR_BASE_REGISTRY=$(yq '.ghcr_base_registry' ansible/group_vars/all.yml)
          SECRETS_REF="${{ github.event.inputs.secrets_ref || 'main' }}"
          echo "SECRETS_REF=${SECRETS_REF}" >> $GITHUB_ENV
          SECRETS_SOURCE_SHA=$(git ls-remote "https://x-access-token:${{ secrets.GH_TOKEN_FOR_ART_GALLERY_SECRETS }}@github.com/${GITHUB_OWNER}/${SECRETS_REPO_NAME}.git" "${SECRETS_REF}" | awk 'NR==1{print $1}')
          echo "SECRETS_SOURCE_SHA=${SECRETS_SOURCE_SHA}" >> $GITHUB_ENV
          SECRETS_REPO_NAME=$(yq '.service_repo_names.secrets' ansible/group_vars/all.yml)
          
          if [ -z "${GITHUB_OWNER}" ] || [ -z "${GHCR_BASE_REGISTRY}" ] || [ -z "${SECRETS_REPO_NAME}" ]; then
            echo "::error::Ansibleのgroup_vars/all.ymlから変数を取得できませんでした。"
            exit 1
          fi
          
          echo "SECRETS_IMAGE_NAME=${GHCR_BASE_REGISTRY}/${GITHUB_OWNER}/${SECRETS_REPO_NAME}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Ansible and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
          ansible-galaxy collection install community.docker

      - name: Build and Push Secrets API Image with Ansible
        run: |
          cd ansible
          ansible-playbook playbook_build_secrets.yml \
            --inventory inventory/ci.yml \
            --extra-vars '{"target_hosts":"ci-server", "secrets_image_tag":"${{ env.SECRETS_IMAGE_TAG }}"}' \
            --tags "build-secrets"
          
          docker push ${{ env.SECRETS_IMAGE_NAME }}:${{ env.SECRETS_IMAGE_TAG }}

      - name: Checkout release-tools for manifest update
        uses: actions/checkout@v4
        with:
          repository: s-hikonyan-sys/art-gallery-release-tools
          ref: main
          token: ${{ secrets.GH_TOKEN_FOR_ART_GALLERY_RELEASE_TOOLS }}
          path: release-tools-manifest

      - name: Install yq for manifest update
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update version manifest (secrets)
        working-directory: release-tools-manifest
        run: |
          UPDATED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          yq eval -i '
            .secrets[strenv(SECRETS_IMAGE_TAG)] = {
              "source_ref": strenv(SECRETS_REF),
              "source_sha": strenv(SECRETS_SOURCE_SHA),
              "image": strenv(SECRETS_IMAGE_NAME) + ":" + strenv(SECRETS_IMAGE_TAG),
              "build_run_id": strenv(GITHUB_RUN_ID),
              "build_workflow": strenv(GITHUB_WORKFLOW),
              "updated_at_utc": strenv(UPDATED_AT)
            }
          ' manifest/secrets/image/secrets_version_manifest.yml
        env:
          SECRETS_IMAGE_TAG: ${{ env.SECRETS_IMAGE_TAG }}
          SECRETS_REF: ${{ env.SECRETS_REF }}
          SECRETS_SOURCE_SHA: ${{ env.SECRETS_SOURCE_SHA }}
          SECRETS_IMAGE_NAME: ${{ env.SECRETS_IMAGE_NAME }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_WORKFLOW: ${{ github.workflow }}

      - name: Create PR for secrets manifest update
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GH_TOKEN_FOR_ART_GALLERY_RELEASE_TOOLS }}
          path: release-tools-manifest
          commit-message: "chore: record secrets build manifest ${{ env.SECRETS_IMAGE_TAG }}"
          branch: "chore/manifest-secrets-${{ env.SECRETS_IMAGE_TAG }}-${{ github.run_id }}"
          delete-branch: true
          title: "chore: record secrets build manifest ${{ env.SECRETS_IMAGE_TAG }}"
          body: |
            Update `manifest/secrets/image/secrets_version_manifest.yml` for secrets build.

            - version: `${{ env.SECRETS_IMAGE_TAG }}`
            - ref: `${{ env.SECRETS_REF }}`
            - source sha: `${{ env.SECRETS_SOURCE_SHA }}`
            - image: `${{ env.SECRETS_IMAGE_NAME }}:${{ env.SECRETS_IMAGE_TAG }}`
            - run id: `${{ github.run_id }}`
          base: main