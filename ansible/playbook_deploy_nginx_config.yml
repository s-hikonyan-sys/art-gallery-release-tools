---
# Nginx: 設定リポジトリの取得と nginx.conf 配置のみ（コンテナ操作なし）

- name: Deploy Nginx configuration files
  hosts: "{{ target_hosts }}"
  become: "{{ ansible_become | mandatory('ansible_become must be set in inventory') }}"

  tasks:
    - name: Deploy nginx config files (source and config)
      ansible.builtin.include_role:
        name: nginx
        tasks_from: deploy
      tags:
        - deploy-nginx
