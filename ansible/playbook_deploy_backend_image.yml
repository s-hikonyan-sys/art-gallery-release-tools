---
# バックエンド: イメージ更新（Pull & コンテナ再作成）のみ
# CI では playbook_deploy_backend_compose.yml の後に実行すること
# 手動実行時は compose 未反映の場合、先に playbook_deploy_backend_compose.yml を実行する

- name: Deploy Backend Image (container update)
  hosts: "{{ target_hosts }}"
  become: "{{ ansible_become | mandatory('ansible_become must be set in inventory') }}"

  tasks:
    - name: Update backend container only (pull and recreate)
      ansible.builtin.include_role:
        name: docker
        tasks_from: container/update/update_backend_image
      tags:
        - docker
        - update-backend-image
