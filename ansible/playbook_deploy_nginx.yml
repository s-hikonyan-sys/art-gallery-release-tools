---
# Nginx 設定デプロイ専用プレイブック
# nginx.conf を git pull して配置し、ホットリロードする

- name: Deploy Nginx Configuration
  hosts: "{{ target_hosts }}"
  become: "{{ ansible_become | mandatory('ansible_become must be set in inventory') }}"

  tasks:
    - name: Deploy docker-compose.yml (generate with resolved versions)
      ansible.builtin.include_role:
        name: docker
        tasks_from: deploy_compose
      tags:
        - docker
        - deploy-compose
        - deploy-nginx

    - name: Update nginx container image (pull + recreate)
      ansible.builtin.include_role:
        name: docker
        tasks_from: container/update/update_nginx_image
      tags:
        - docker
        - update-nginx-image

    - name: Deploy nginx config and reload
      ansible.builtin.include_role:
        name: nginx
        tasks_from: deploy
      tags:
        - deploy-nginx
        - reload-nginx
