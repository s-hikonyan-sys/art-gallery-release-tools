---
# Nginx: 手動一括デプロイ（compose → 設定 → イメージ更新）
# CI では deploy_nginx ワークフローが複数プレイブックで順序を制御する
# WAF 初期設定: playbook_setup_waf.yml / シグネチャ更新: playbook_update_waf_signatures.yml

- name: Deploy Nginx (full manual)
  hosts: "{{ target_hosts }}"
  become: "{{ ansible_become | mandatory('ansible_become must be set in inventory') }}"

  tasks:
    - name: Deploy docker-compose.yml
      ansible.builtin.include_role:
        name: docker
        tasks_from: deploy_compose

    - name: Deploy nginx config files (source and config)
      ansible.builtin.include_role:
        name: nginx
        tasks_from: deploy

    - name: Check prerequisites for nginx container update
      block:
        - name: Stat frontend dist (index.html)
          ansible.builtin.stat:
            path: "{{ deployment_paths.dist_dir }}/frontend/index.html"
          register: nginx_prereq_frontend

        - name: Stat nginx.conf on host
          ansible.builtin.stat:
            path: "{{ deployment_paths.conf_dir }}/nginx/nginx.conf"
          register: nginx_prereq_conf

        - name: Warn if frontend dist is missing
          ansible.builtin.debug:
            msg: >-
              【警告】Frontend の成果物が見つかりません: {{ deployment_paths.dist_dir }}/frontend/index.html
              デプロイは続行しますが、静的配信は 404 になる可能性があります。
          when: not nginx_prereq_frontend.stat.exists

        - name: Warn if nginx config is missing
          ansible.builtin.debug:
            msg: >-
              【重要】Nginx の設定ファイルが見つかりません: {{ deployment_paths.conf_dir }}/nginx/nginx.conf
              このまま続行すると Nginx コンテナの起動に失敗する可能性が高いです。
          when: not nginx_prereq_conf.stat.exists

    - name: Update nginx container image (pull + recreate)
      ansible.builtin.include_role:
        name: docker
        tasks_from: container/update/update_nginx_image
