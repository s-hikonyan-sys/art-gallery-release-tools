---
# Nginx 設定デプロイ専用プレイブック
# nginx.conf を git pull して配置する（リロードは別CI）

- name: Deploy Nginx Configuration
  hosts: "{{ target_hosts }}"
  become: "{{ ansible_become | mandatory('ansible_become must be set in inventory') }}"

  tasks:
    - name: Check frontend dist is present (required by nginx)
      ansible.builtin.stat:
        path: "{{ deployment_paths.dist_dir }}/frontend/index.html"
      register: frontend_index_html
      tags:
        - update-nginx-image

    - name: Abort nginx deployment when frontend dist is missing
      ansible.builtin.fail:
        msg: >-
          Frontendの成果物が見つかりません: {{ deployment_paths.dist_dir }}/frontend/index.html
          nginxのデプロイ前に、先にFrontendをデプロイしてください（playbook_deploy_frontend.yml を deploy-frontend で実行）。
      when: not frontend_index_html.stat.exists
      tags:
        - update-nginx-image

    - name: Deploy docker-compose.yml (generate with resolved versions)
      ansible.builtin.include_role:
        name: docker
        tasks_from: deploy_compose
      tags:
        - deploy-compose
        - update-nginx-image

    - name: Update nginx container image (pull + recreate)
      ansible.builtin.include_role:
        name: docker
        tasks_from: container/update/update_nginx_image
      tags:
        - update-nginx-image

    - name: Deploy nginx config only
      ansible.builtin.include_role:
        name: nginx
        tasks_from: deploy
      tags:
        - deploy-nginx
