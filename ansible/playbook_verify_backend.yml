---
# バックエンド: 検証のみ（コンテナ起動・再起動の後に実行）

- name: Verify Backend Application
  hosts: "{{ target_hosts }}"
  become: "{{ ansible_become | mandatory('ansible_become must be set in inventory') }}"

  tasks:
    - name: Run backend verification
      ansible.builtin.include_role:
        name: backend
        tasks_from: verify_only
      tags:
        - verify
        - backend
