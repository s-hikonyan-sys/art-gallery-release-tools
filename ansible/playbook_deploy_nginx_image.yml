---
# Nginx: イメージ Pull とコンテナ再作成のみ
# CI では playbook_deploy_nginx_compose.yml の後に実行すること
# 前提: ホスト上に frontend 成果物と nginx.conf が存在すること（未配置なら失敗）

- name: Deploy Nginx container image
  hosts: "{{ target_hosts }}"
  become: "{{ ansible_become | mandatory('ansible_become must be set in inventory') }}"

  tasks:
    - name: Check prerequisites for nginx container update
      block:
        - name: Stat frontend dist (index.html)
          ansible.builtin.stat:
            path: "{{ deployment_paths.dist_dir }}/frontend/index.html"
          register: nginx_prereq_frontend

        - name: Stat nginx.conf on host
          ansible.builtin.stat:
            path: "{{ deployment_paths.conf_dir }}/nginx/nginx.conf"
          register: nginx_prereq_conf

        - name: Fail if frontend dist is missing
          ansible.builtin.fail:
            msg: >-
              Frontendの成果物が見つかりません: {{ deployment_paths.dist_dir }}/frontend/index.html
              先に Frontend をデプロイしてください（Deploy Frontend ワークフロー等）。
          when: not nginx_prereq_frontend.stat.exists

        - name: Fail if nginx config is missing
          ansible.builtin.fail:
            msg: >-
              Nginx の設定ファイルが見つかりません: {{ deployment_paths.conf_dir }}/nginx/nginx.conf
              先に Nginx 設定デプロイ（run_deploy_code）を実行してください。
          when: not nginx_prereq_conf.stat.exists

    - name: Update nginx container image (pull + recreate)
      ansible.builtin.include_role:
        name: docker
        tasks_from: container/update/update_nginx_image
      tags:
        - docker
        - update-nginx-image
