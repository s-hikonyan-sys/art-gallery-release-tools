---
# Frontend: 手動一括デプロイ（compose → 成果物配置 → Nginx 起動確認後リロード）
# CI では deploy_frontend ワークフローが複数プレイブックで順序を制御する

- name: Deploy Frontend Application
  hosts: "{{ target_hosts }}"
  become: "{{ ansible_become | mandatory('ansible_become must be set in inventory') }}"

  tasks:
    - name: Deploy docker-compose.yml
      ansible.builtin.include_role:
        name: docker
        tasks_from: deploy_compose
      tags:
        - docker
        - deploy-compose
        - deploy-frontend

    - name: Deploy frontend (download artifact and place)
      ansible.builtin.include_role:
        name: frontend
        tasks_from: deploy
      tags:
        - deploy-frontend

    - name: Ensure nginx is running and reload configuration
      ansible.builtin.include_role:
        name: nginx
        tasks_from: safe_reload_with_start
      tags:
        - reload-nginx
        - deploy-frontend
