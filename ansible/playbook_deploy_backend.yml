---
# バックエンド: イメージ + コードを一括デプロイ（手動・単一プレイブック向け）
# 実行順: compose → コード/設定 → イメージ更新（再作成）→ 検証
# CI では deploy_backend ワークフローが複数プレイブックで同じ順序を保証する

- name: Deploy Backend Application
  hosts: "{{ target_hosts }}"
  become: "{{ ansible_become | mandatory('ansible_become must be set in inventory') }}"

  tasks:
    - name: Deploy docker-compose.yml
      ansible.builtin.include_role:
        name: docker
        tasks_from: deploy_compose
      tags:
        - docker
        - deploy-compose
        - deploy-backend

    - name: Deploy backend (source and config)
      ansible.builtin.include_role:
        name: backend
        tasks_from: deploy_only
      tags:
        - deploy-backend

    - name: Update backend container only (pull and restart)
      ansible.builtin.include_role:
        name: docker
        tasks_from: container/update/update_backend_image
      tags:
        - docker
        - update-backend-image

    - name: Verify backend
      ansible.builtin.include_role:
        name: backend
        tasks_from: verify_only
      tags:
        - verify
        - backend
