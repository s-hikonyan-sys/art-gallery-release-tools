---
# secrets-api が healthy になるまで docker compose up と待機する。
# マイグレーション・Postgres/Backend の起動・再起動・Postgres イメージ更新前に共通利用する。
#
# 使い捨てトークンで secrets が Exited(0) になり得るため、Ansible 各タスクで冪等に立ち上げ直す。
# update_backend_image では ensure_backend_dependencies.sh が別途クリーンアップ＋起動も行う（手動運用用）。
# 設計の整理は docs/deployment_dependencies.md を参照。

- name: Ensure Secrets API is healthy
  ansible.builtin.shell: |
    STATUS=$(docker inspect --format='{{ "{{.State.Health.Status}}" }}' {{ container_names.secrets }} 2>/dev/null || echo "missing")
    if [ "$STATUS" != "healthy" ]; then
      cd {{ deployment_paths.deployment_dir }}
      docker compose up -d secrets-api
      for i in {1..12}; do
        if [ "$(docker inspect --format='{{ "{{.State.Health.Status}}" }}' {{ container_names.secrets }} 2>/dev/null)" == "healthy" ]; then
          exit 0
        fi
        sleep 5
      done
      exit 1
    fi
  changed_when: false
