---
# Postgres コンテナのイメージを更新し、再作成・再起動する

# secretsコンテナの状態を一度クリーンにしてトークンを発行させる（冪等性の担保の）
- name: Clean up existing docker-compose services and volumes (for CI stability)
  ansible.builtin.shell: |
    cd {{ deployment_paths.deployment_dir }}
    docker compose down --remove-orphans -v || true # エラーを無視して続行
  changed_when: false
  tags: [docker, update-postgres-image]

- name: Ensure Secrets API is healthy before updating Postgres
  ansible.builtin.shell: |
    STATUS=$(docker inspect --format='{{ "{{.State.Health.Status}}" }}' {{ container_names.secrets }} 2>/dev/null || echo "missing")
    if [ "$STATUS" != "healthy" ]; then
      cd {{ deployment_paths.deployment_dir }}
      docker compose up -d secrets-api
      # ヘルスチェック待ち（最大60秒）
      for i in {1..12}; do
        if [ "$(docker inspect --format='{{ "{{.State.Health.Status}}" }}' {{ container_names.secrets }} 2>/dev/null)" == "healthy" ]; then
          exit 0
        fi
        sleep 5
      done
      exit 1
    fi
  changed_when: false
  tags: [docker, update-postgres-image]

- name: Pull latest Postgres image and recreate container
  community.docker.docker_compose_v2:    
    project_src: "{{ deployment_paths.deployment_dir }}"
    files:
      - docker-compose.yml
    services:
      - "postgres"
    pull: always
    recreate: always
  environment:
    DOCKER_CONFIG: "/home/{{ ansible_user }}/.docker"
  become: no  
  tags:    
    - docker
    - update-postgres-image
