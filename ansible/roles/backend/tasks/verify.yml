---
# バックエンド検証処理

- name: Verify backend app.py exists
  ansible.builtin.stat:
    path: "{{ deployment_paths.src_dir }}/{{ service_repo_names.backend }}/app.py"
  register: backend_app_py
  failed_when: not backend_app_py.stat.exists
  tags:
    - backend
    - verify

- name: Verify backend domain directory exists
  ansible.builtin.stat:
    path: "{{ deployment_paths.src_dir }}/{{ service_repo_names.backend }}/domain/"
  register: backend_domain_dir
  failed_when: not backend_domain_dir.stat.exists
  tags:
    - backend
    - verify

- name: Verify backend log file exists
  ansible.builtin.stat:
    path: "{{ deployment_paths.logs_dir }}/backend/app.log"
  register: log_file
  failed_when: not log_file.stat.exists
  tags:
    - backend
    - verify

# バックエンドは compose でホストへ ports 公開していないため、コンテナ内からヘルスを確認する
- name: Check if backend is responding (HTTP check via docker exec)
  ansible.builtin.shell:
    cmd: >-
      docker exec {{ container_names.backend }} python -c
      "import urllib.request as u; r=u.urlopen('http://127.0.0.1:{{ backend_port }}{{ health_check.backend_path }}', timeout=15); assert r.status==200"
  register: backend_health
  changed_when: false
  retries: 12
  delay: 5
  until: backend_health.rc == 0
  become: true
  tags:
    - backend
    - verify
