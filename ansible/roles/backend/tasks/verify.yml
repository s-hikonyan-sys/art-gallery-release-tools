---
# バックエンド検証処理

- name: Verify backend app.py exists
  ansible.builtin.stat:
    path: "{{ deployment_paths.src_dir }}/{{ service_repo_names.backend }}/app.py"
  register: backend_app_py
  failed_when: not backend_app_py.stat.exists
  tags:
    - backend
    - verify

- name: Verify backend domain directory exists
  ansible.builtin.stat:
    path: "{{ deployment_paths.src_dir }}/{{ service_repo_names.backend }}/domain/"
  register: backend_domain_dir
  failed_when: not backend_domain_dir.stat.exists
  tags:
    - backend
    - verify

- name: Verify backend log file exists
  ansible.builtin.stat:
    path: "{{ deployment_paths.logs_dir }}/backend/app.log"
  register: log_file
  failed_when: not log_file.stat.exists
  tags:
    - backend
    - verify

- name: Check if backend is responding (HTTP check)
  ansible.builtin.uri:
    url: "http://localhost:{{ backend_port }}{{ health_check.backend_path }}"
    method: GET
    status_code: 200
  tags:
    - backend
    - verify
