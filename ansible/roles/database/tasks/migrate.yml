---
# DB マイグレーション用パスワードは postgres-entrypoint と同様、
# migration_token.txt と secrets-api の GET /secrets/database/password で取得する。
# （database_token は起動時に消費済みのため別トークンが必要）
#
# update-postgres-image を伴わないマイグレのみ実行しても secrets が Exited のままだと取得に失敗する。
# コンテナ内シェルは隣コンテナを起動できないため、ホスト側で ensure_secrets_healthy を先に実行する。

- name: Ensure Secrets API is healthy before migrations
  ansible.builtin.include_role:
    name: docker
    tasks_from: ensure_secrets_healthy
    apply:
      tags: [database-migration]
  tags: [database-migration]

- name: Ensure migration helper script is deployed
  ansible.builtin.template:
    src: run_migration.py.j2
    dest: "{{ deployment_paths.deployment_dir }}/scripts/run_migration.py"
    mode: '0755'
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
  tags: [database-migration]

- name: Copy migration helper script into postgres container
  ansible.builtin.shell: |
    docker cp "{{ deployment_paths.deployment_dir }}/scripts/run_migration.py" \
      "{{ container_names.postgres | mandatory('container_names.postgres must be set in inventory') }}:/tmp/run_migration.py"
  tags: [database-migration]

- name: Run migrations in postgres container via secrets-api token flow
  ansible.builtin.shell: |
    docker exec -u root {{ container_names.postgres | mandatory('container_names.postgres must be set in inventory') }} \
      python3 /tmp/run_migration.py \
      --db-user {{ database_user }} \
      --db-name {{ database_name }} \
      --migrations-dir /app/migrations \
      --target-version {{ database_migration.target_version }}
  register: migrate_result
  until: migrate_result.rc == 0
  retries: 5
  delay: 5
  tags: [database-migration]
