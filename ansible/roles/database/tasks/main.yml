---

- name: Ensure database scripts directory exists  
  ansible.builtin.file:    
    path: "{{ deployment_paths.deployment_dir }}/scripts"    
    state: directory    
    mode: '0755'    
    owner: "{{ app_user | mandatory('app_user must be set in inventory') }}"
    group: "{{ app_user | mandatory('app_user must be set in inventory') }}"
  tags:    
    - deploy-database-code

- name: Ensure database config directory exists
  ansible.builtin.file:
    path: "{{ deployment_paths.conf_dir }}/database/config"
    state: directory
    mode: '0700'
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
  tags:    
    - deploy-database-code

- name: Deploy secrets_api_config.sh for database entrypoint
  ansible.builtin.template:
    src: secrets_api_config.sh.j2
    mode: '0644'
    dest: "{{ deployment_paths.deployment_dir }}/scripts/secrets_api_config.sh"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
  tags:
    - deploy-database-code

- name: Include deploy tasks  
  ansible.builtin.include_tasks: deploy.yml  
  tags:    
    - deploy-database-code

- name: Include migration tasks  
  ansible.builtin.include_tasks: migrate.yml  
  tags:    
    - database-migration
