---
# ホスト上 {{ deployment_paths.conf_dir }}/nginx/waf_config にテンプレート出力。
# compose で /tmp/host_waf_config に :ro マウントし、art-gallery-nginx の entrypoint が起動時にコピーする。
- name: Ensure WAF host overlay directory for compose mount
  ansible.builtin.file:
    path: "{{ deployment_paths.conf_dir }}/nginx/waf_config"
    state: directory
    mode: '0700'
    owner: root
    group: root
  become: true
  when:
    - (waf_latest_download_url is defined and waf_header_ini_url is defined and waf_support_id is defined and waf_password is defined)
      or (waf_serial_key is defined)

- name: Render WAF siteguardlite.ini on host
  ansible.builtin.template:
    src: siteguardlite.ini.j2
    dest: "{{ deployment_paths.conf_dir }}/nginx/waf_config/{{ waf_main_conf_filename | mandatory('waf_main_conf_filename must be set (e.g. siteguardlite.ini)') }}"
    mode: '0600'
    owner: root
    group: root
  become: true
  no_log: true
  register: waf_overlay_ini_rendered
  when: waf_serial_key is defined

- name: Render WAF dbupdate.conf on host
  ansible.builtin.template:
    src: dbupdate.conf.j2
    dest: "{{ deployment_paths.conf_dir }}/nginx/waf_config/{{ waf_update_conf_filename | mandatory('waf_update_conf_filename must be set (e.g. dbupdate.conf)') }}"
    mode: '0600'
    owner: root
    group: root
  become: true
  no_log: true
  register: waf_overlay_conf_rendered
  when:
    - waf_latest_download_url is defined
    - waf_header_ini_url is defined
    - waf_support_id is defined
    - waf_password is defined

- name: Render WAF dbupdate_waf script on host
  ansible.builtin.template:
    src: dbupdate_waf.j2
    dest: "{{ deployment_paths.conf_dir }}/nginx/waf_config/dbupdate_waf"
    mode: '0755'
    owner: root
    group: root
  become: true
  register: waf_overlay_script_rendered
  when:
    - waf_install_dir is defined
    - waf_latest_download_url is defined
    - waf_header_ini_url is defined
    - waf_support_id is defined
    - waf_password is defined

- name: Detect nginx container running (for restart after WAF overlay)
  ansible.builtin.shell: |
    docker inspect --format='{{ "{{.State.Running}}" }}' \
      {{ container_names.nginx | mandatory('container_names.nginx must be set in inventory') }} 2>/dev/null || echo "false"
  register: waf_overlay_nginx_running_cmd
  changed_when: false
  when:
    - (waf_overlay_ini_rendered is defined and waf_overlay_ini_rendered is changed)
      or (waf_overlay_conf_rendered is defined and waf_overlay_conf_rendered is changed)
      or (waf_overlay_script_rendered is defined and waf_overlay_script_rendered is changed)

- name: Restart nginx to re-run entrypoint (refresh WAF files from host overlay)
  ansible.builtin.shell: |
    docker restart {{ container_names.nginx | mandatory('container_names.nginx must be set in inventory') }}
  become: true
  when:
    - (waf_overlay_ini_rendered is defined and waf_overlay_ini_rendered is changed)
      or (waf_overlay_conf_rendered is defined and waf_overlay_conf_rendered is changed)
      or (waf_overlay_script_rendered is defined and waf_overlay_script_rendered is changed)
    - waf_overlay_nginx_running_cmd is defined
    - waf_overlay_nginx_running_cmd.stdout | trim == 'true'
