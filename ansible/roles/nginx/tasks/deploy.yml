---
# nginx.conf は roles/nginx/templates をテンプレート生成（SSL / WAF / ドメインをインベントリから反映）
# art-gallery-nginx リポジトリは参考用・将来資産用に git pull 可（必須ではない）
# nginx -t / reload は reload-nginx タグ時のみ

- name: Ensure nginx-related directories exist with correct ownership
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: "{{ app_user | mandatory('app_user must be set in inventory') }}"
    group: "{{ app_user | mandatory('app_user must be set in inventory') }}"
  loop:
    - "{{ deployment_paths.conf_dir }}/nginx"
    - "{{ deployment_paths.conf_dir }}/nginx/conf.d"
    - "{{ deployment_paths.src_dir }}/{{ service_repo_names.nginx }}"
    - "{{ deployment_paths.logs_dir }}/nginx"
  tags:
    - nginx
    - deploy-nginx
    - deploy-all

- name: Pull nginx configuration from GitHub
  # git -c によるインメモリ認証設定を使用。.git/config へのトークン書き込みを防ぐ
  ansible.builtin.shell: |
    set -e
    DEST="{{ deployment_paths.src_dir }}/{{ service_repo_names.nginx }}"
    REPO_URL="https://github.com/{{ github_owner }}/{{ service_repo_names.nginx }}.git"
    TOKEN_REWRITE="url.https://x-access-token:{{ github_token_nginx }}@github.com/.insteadOf=https://github.com/"

    if [ -d "${DEST}/.git" ]; then
      git -C "${DEST}" -c "${TOKEN_REWRITE}" fetch --depth 1 origin "{{ nginx_ref | mandatory('nginx_ref must be provided') }}"
      git -C "${DEST}" reset --hard FETCH_HEAD
    else
      git -c "${TOKEN_REWRITE}" clone --depth 1 --branch "{{ nginx_ref | mandatory('nginx_ref must be provided') }}" \
        "${REPO_URL}" "${DEST}"
    fi
  no_log: true
  become: yes
  become_user: "{{ app_user | mandatory('app_user must be set in inventory') }}"
  tags:
    - nginx
    - deploy-nginx
    - deploy-all

- name: Render nginx.conf from role template
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ deployment_paths.conf_dir }}/nginx/nginx.conf"
    mode: '0644'
    owner: "{{ app_user | mandatory('app_user must be set in inventory') }}"
    group: "{{ app_user | mandatory('app_user must be set in inventory') }}"
  become: yes
  tags:
    - nginx
    - deploy-nginx
    - deploy-all

- name: Render common location snippets from role template
  ansible.builtin.template:
    src: common_locations.inc.j2
    dest: "{{ deployment_paths.conf_dir }}/nginx/conf.d/common_locations.inc"
    mode: '0644'
    owner: "{{ app_user | mandatory('app_user must be set in inventory') }}"
    group: "{{ app_user | mandatory('app_user must be set in inventory') }}"
  become: yes
  tags:
    - nginx
    - deploy-nginx
    - deploy-all

- name: Build WAF download URL facts for overlay templates
  ansible.builtin.include_tasks: waf_build_url_facts.yml
  when:
    - waf_update_base_url is defined
    - waf_update_path_suffix is defined
  tags:
    - nginx
    - deploy-nginx
    - deploy-all

- name: Render WAF overlay and push into container (when nginx is running)
  ansible.builtin.include_tasks: waf_render_overlay_files.yml
  when:
    - waf_support_id is defined
    - waf_password is defined
  tags:
    - nginx
    - deploy-nginx
    - deploy-all

- name: Test nginx configuration syntax
  ansible.builtin.shell: |
    docker exec {{ container_names.nginx | mandatory('container_names.nginx must be set in inventory') }} nginx -t
  register: nginx_test_result
  failed_when: nginx_test_result.rc != 0
  when: "'reload-nginx' in ansible_run_tags"
  tags:
    - nginx
    - reload-nginx
    - deploy-all

- name: Reload nginx (hot reload, no downtime)
  ansible.builtin.shell: |
    docker exec {{ container_names.nginx | mandatory('container_names.nginx must be set in inventory') }} nginx -s reload
  when:
    - "'reload-nginx' in ansible_run_tags"
    - nginx_test_result is defined
    - nginx_test_result.rc == 0
  tags:
    - nginx
    - reload-nginx
    - deploy-all
