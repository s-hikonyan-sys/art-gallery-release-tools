---
# WAF 初期設定（ホスト上のテンプレート → バインドマウントでコンテナに反映）
# タグ: setup-waf
#
# extra-vars: waf_serial_key, waf_support_id, waf_password,
#             waf_install_dir, waf_conf_container_path, waf_data_container_path,
#             waf_main_conf_filename, waf_update_conf_filename,
#             waf_update_base_url, waf_update_path_suffix

- name: Check nginx container is running
  ansible.builtin.shell: |
    docker inspect --format='{{ "{{.State.Status}}" }}' \
      {{ container_names.nginx | mandatory('container_names.nginx must be set in inventory') }} 2>/dev/null || echo "not_found"
  register: nginx_status
  changed_when: false
  tags:
    - nginx
    - setup-waf

- name: Fail if nginx container is not running
  ansible.builtin.fail:
    msg: >-
      nginx コンテナが起動していません（status: {{ nginx_status.stdout }}）。
      先に deploy_nginx.yml でコンテナをデプロイしてください。
  when: nginx_status.stdout != "running"
  tags:
    - nginx
    - setup-waf

- name: Build WAF download URL facts
  ansible.builtin.include_tasks: waf_build_url_facts.yml
  tags:
    - nginx
    - setup-waf

- name: Require WAF URL facts and credentials for overlay render
  ansible.builtin.assert:
    that:
      - waf_latest_download_url is defined
      - waf_header_ini_url is defined
      - waf_support_id is defined
      - waf_password is defined
    fail_msg: >-
      WAF の Secrets（WAF_UPDATE_* / WAF_SUPPORT_ID / WAF_PASSWORD）が extra-vars に必要です。
  tags:
    - nginx
    - setup-waf

- name: Render WAF bind-mount overlay files on host
  ansible.builtin.include_tasks: waf_render_overlay_files.yml
  tags:
    - nginx
    - setup-waf

- name: Set WAF license serial key
  ansible.builtin.shell: |
    docker exec {{ container_names.nginx }} \
      /bin/sh -c "
        CONF='{{ waf_conf_container_path }}/{{ waf_main_conf_filename }}'
        if grep -q '^serial=' \"\$CONF\"; then
          sed -i 's|^serial=.*|serial={{ waf_serial_key | mandatory }}|' \"\$CONF\"
        else
          echo 'serial={{ waf_serial_key | mandatory }}' >> \"\$CONF\"
        fi
      "
  no_log: true
  tags:
    - nginx
    - setup-waf

- name: Apply WAF configuration
  ansible.builtin.shell: |
    docker exec {{ container_names.nginx }} \
      /bin/sh -c "set -e && nginx -t && nginx -s reload && cd {{ waf_install_dir | mandatory | quote }} && ./rc.siteguardlite_notify reload"
  register: waf_reconfig
  changed_when: true
  tags:
    - nginx
    - setup-waf

- name: Show WAF configuration apply output
  ansible.builtin.debug:
    msg: "{{ waf_reconfig.stdout_lines | default([]) }}"
  tags:
    - nginx
    - setup-waf

- name: Run initial WAF signature update
  ansible.builtin.shell: |
    docker exec -w {{ waf_install_dir | mandatory | quote }} \
      {{ container_names.nginx }} \
      ./dbupdate_waf
  register: waf_update
  changed_when: waf_update.rc == 0
  tags:
    - nginx
    - setup-waf

- name: Show signature update result
  ansible.builtin.debug:
    msg: "{{ waf_update.stdout_lines | default([]) }}"
  tags:
    - nginx
    - setup-waf

- name: WAF initial setup completed
  ansible.builtin.debug:
    msg: >-
      WAF 初期設定が完了しました。
      dbupdate.conf / dbupdate_waf は {{ deployment_paths.conf_dir }}/nginx/waf を :ro マウントしています。
  tags:
    - nginx
    - setup-waf
