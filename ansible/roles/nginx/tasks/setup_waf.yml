---
# WAF 初期設定タスク
# nginx コンテナの初回起動後に一度だけ実行する。
# タグ: setup-waf
#
# 実行前提:
#   - nginx コンテナが running 状態であること
#   - extra-vars: waf_serial_key, waf_support_id, waf_password,
#                 waf_install_dir, waf_conf_container_path, waf_data_container_path,
#                 waf_main_conf_filename, waf_update_conf_filename,
#                 waf_update_base_url, waf_update_path_suffix（LATEST_URL 用・GitHub Secrets）
#
# dbupdate.conf: イメージでは dbupdate_waf_url.conf へのシンボリックリンク。
# dbupdate_waf は perl で同ファイルから sig_download_* を読み、後続で . dbupdate_waf_url.conf により
# LATEST_URL / HEADER_INI_URL も再読込する。URL は siteguardlite_sp 系に Secrets で揃える。
#
# 実行方法（手動）:
#   ansible-playbook playbook_setup_waf.yml \
#     --extra-vars "waf_serial_key=XXX waf_support_id=XXX waf_password=XXX"

- name: Check nginx container is running
  ansible.builtin.shell: |
    docker inspect --format='{{ "{{.State.Status}}" }}' \
      {{ container_names.nginx | mandatory('container_names.nginx must be set in inventory') }} 2>/dev/null || echo "not_found"
  register: nginx_status
  changed_when: false
  tags:
    - nginx
    - setup-waf

- name: Fail if nginx container is not running
  ansible.builtin.fail:
    msg: >-
      nginx コンテナが起動していません（status: {{ nginx_status.stdout }}）。
      先に deploy_nginx.yml でコンテナをデプロイしてください。
  when: nginx_status.stdout != "running"
  tags:
    - nginx
    - setup-waf

# --- シグネチャ更新 URL（LATEST_URL）を GitHub Secrets 由来の値で書き込む ---
# さくら VPS 向け例: base=https://www.jp-secure.com/download/siteguardlite_sp
#                  suffix=updates_nw/latest-nw.zip（マニュアル 7.2 Nginx 版に合わせる）
- name: Build WAF LATEST_URL for dbupdate config
  ansible.builtin.set_fact:
    waf_latest_download_url: >-
      {{ (waf_update_base_url | mandatory('waf_update_base_url: set GitHub Secret WAF_UPDATE_BASE_URL'))
         | trim | regex_replace('/+$', '') }}/{{ (waf_update_path_suffix | mandatory('waf_update_path_suffix: set GitHub Secret WAF_UPDATE_PATH_SUFFIX'))
         | trim | regex_replace('^/+', '') }}
  tags:
    - nginx
    - setup-waf

- name: Derive HEADER_INI_URL from signature ZIP URL
  ansible.builtin.set_fact:
    waf_header_ini_url: "{{ waf_latest_download_url | regex_replace('/[^/]+\\.zip$', '/header.ini') }}"
  tags:
    - nginx
    - setup-waf

- name: Switch WAF signature update URL and header.ini URL
  ansible.builtin.shell: |
    docker exec \
      -e FINAL_URL={{ waf_latest_download_url | quote }} \
      -e HEADER_URL={{ waf_header_ini_url | quote }} \
      {{ container_names.nginx }} \
      /bin/sh -c '
        CONF_LINK="{{ waf_conf_container_path }}/{{ waf_update_conf_filename }}"
        if [ -L "$CONF_LINK" ]; then
          CONF=$(readlink -f "$CONF_LINK")
        else
          CONF="$CONF_LINK"
        fi
        if [ -f "$CONF" ]; then
          if grep -q "^LATEST_URL=" "$CONF" 2>/dev/null; then
            sed -i "s|^LATEST_URL=.*|LATEST_URL=${FINAL_URL}|" "$CONF"
          else
            echo "LATEST_URL=${FINAL_URL}" >> "$CONF"
          fi
          if grep -q "^HEADER_INI_URL=" "$CONF" 2>/dev/null; then
            sed -i "s|^HEADER_INI_URL=.*|HEADER_INI_URL=${HEADER_URL}|" "$CONF"
          else
            echo "HEADER_INI_URL=${HEADER_URL}" >> "$CONF"
          fi
        else
          {
            echo "LATEST_URL=${FINAL_URL}"
            echo "HEADER_INI_URL=${HEADER_URL}"
          } > "$CONF_LINK"
        fi
      '
  register: waf_url_result
  changed_when: waf_url_result.rc == 0
  tags:
    - nginx
    - setup-waf

# --- ライセンス情報を設定する ---
- name: Set WAF license serial key
  ansible.builtin.shell: |
    docker exec {{ container_names.nginx }} \
      /bin/sh -c "
        CONF='{{ waf_conf_container_path }}/{{ waf_main_conf_filename }}'
        if grep -q '^serial=' \"\$CONF\"; then
          sed -i 's|^serial=.*|serial={{ waf_serial_key | mandatory }}|' \"\$CONF\"
        else
          echo 'serial={{ waf_serial_key | mandatory }}' >> \"\$CONF\"
        fi
      "
  no_log: true
  tags:
    - nginx
    - setup-waf

# GitHub Secrets → sig_download_*（旧 SUPPORT_* / 誤った == 行を除いてから追記）
- name: Set WAF signature download credentials for dbupdate_waf
  ansible.builtin.shell: |
    docker exec \
      -e SIG_U={{ waf_support_id | mandatory | quote }} \
      -e SIG_P={{ waf_password | mandatory | quote }} \
      {{ container_names.nginx }} \
      /bin/sh -c '
        CONF_LINK="{{ waf_conf_container_path }}/{{ waf_update_conf_filename }}"
        if [ -L "$CONF_LINK" ]; then
          CONF=$(readlink -f "$CONF_LINK")
        else
          CONF="$CONF_LINK"
        fi
        SIG_U=$(printf %s "$SIG_U" | sed "s/^[[:space:]]*//;s/[[:space:]]*$//")
        SIG_P=$(printf %s "$SIG_P" | sed "s/^[[:space:]]*//;s/[[:space:]]*$//")
        tmp="${CONF}.ansible.$$"
        if [ -f "$CONF" ]; then
          grep -vE "^(sig_download_user|sig_download_pass|SUPPORT_ID|SUPPORT_PASSWORD)=" "$CONF" > "$tmp"
        else
          : > "$tmp"
        fi
        mv "$tmp" "$CONF"
        printf "%s\n" "sig_download_user=${SIG_U}" "sig_download_pass=${SIG_P}" >> "$CONF"
      '
  no_log: true
  tags:
    - nginx
    - setup-waf

# dbupdate.conf が通常ファイルになっていると url 側と内容が分岐する。. dbupdate_waf_url.conf が古い URL のままになるため同期する。
- name: Reconcile dbupdate_waf_url.conf if dbupdate.conf is not a symlink
  ansible.builtin.shell: |
    docker exec {{ container_names.nginx }} \
      /bin/sh -c '
        LINK="{{ waf_conf_container_path }}/{{ waf_update_conf_filename }}"
        URLB="{{ waf_conf_container_path }}/dbupdate_waf_url.conf"
        if [ -f "$LINK" ] && [ ! -L "$LINK" ] && [ -f "$URLB" ]; then
          if ! cmp -s "$LINK" "$URLB"; then
            cp -f "$LINK" "$URLB" && echo reconciled
          fi
        fi
      '
  register: reconcile_dbupdate_url
  changed_when: "'reconciled' in (reconcile_dbupdate_url.stdout | default(''))"
  tags:
    - nginx
    - setup-waf

# --- 設定適用 ---
# Makefile の reconfig は $(NGINXBIN) 等がコンテナ内で空になり得るため、
# nginx リロード + notify の reload を直接実行する（SiteGuard の reconfig ターゲットと同等）。
- name: Apply WAF configuration
  ansible.builtin.shell: |
    docker exec {{ container_names.nginx }} \
      /bin/sh -c "set -e && nginx -t && nginx -s reload && cd {{ waf_install_dir | mandatory | quote }} && ./rc.siteguardlite_notify reload"
  register: waf_reconfig
  changed_when: true
  tags:
    - nginx
    - setup-waf

- name: Show WAF configuration apply output
  ansible.builtin.debug:
    msg: "{{ waf_reconfig.stdout_lines | default([]) }}"
  tags:
    - nginx
    - setup-waf

# --- 初回シグネチャ更新 ---
# Makefile に update ターゲットは無い。シグネチャ更新は ./dbupdate_waf。
- name: Run initial WAF signature update
  ansible.builtin.shell: |
    docker exec -w {{ waf_install_dir | mandatory | quote }} \
      {{ container_names.nginx }} \
      ./dbupdate_waf
  register: waf_update
  changed_when: waf_update.rc == 0
  tags:
    - nginx
    - setup-waf

- name: Show signature update result
  ansible.builtin.debug:
    msg: "{{ waf_update.stdout_lines }}"
  tags:
    - nginx
    - setup-waf

- name: WAF initial setup completed
  ansible.builtin.debug:
    msg: >-
      WAF 初期設定が完了しました（設定反映で nginx をリロード済み）。
      手動で dbupdate_waf を sed 改変した場合は、コンテナ再作成でイメージのスクリプトに戻すか、
      VPS 上で
      mv /opt/jp-secure/siteguardlite/dbupdate_waf.bak /opt/jp-secure/siteguardlite/dbupdate_waf
      を実行してください。
  tags:
    - nginx
    - setup-waf
