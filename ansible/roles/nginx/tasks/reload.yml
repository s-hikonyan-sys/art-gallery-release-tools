---
# Nginx ホットリロードのみ（git pull / conf コピーなし）
# frontend デプロイ後に dist/frontend の変更を nginx に認識させるために使用
# nginx.conf の変更を伴わないため git pull は不要

- name: Get nginx container status
  ansible.builtin.shell: |
    docker inspect --format='{{ "{{.State.Status}}" }}' {{ container_names.nginx | mandatory('container_names.nginx must be set in inventory') }} 2>/dev/null || echo "not_found"
  register: nginx_container_status
  changed_when: false
  tags:
    - nginx
    - reload-nginx
    - deploy-frontend

- name: Handle missing nginx container (skip reload)
  block:
    - name: Show message for missing nginx container
      ansible.builtin.debug:
        msg: "nginxコンテナがないため終了します。この後にnginxコンテナをデプロイしてください。"
    - name: End host processing normally
      ansible.builtin.meta: end_host
  when: nginx_container_status.stdout == "not_found"
  tags:
    - nginx
    - reload-nginx
    - deploy-frontend

- name: Handle stopped nginx container (skip reload)
  block:
    - name: Show message for stopped nginx container
      ansible.builtin.debug:
        msg: "nginxコンテナが停止しています、起動させてください。"
    - name: End host processing normally
      ansible.builtin.meta: end_host
  when: nginx_container_status.stdout != "not_found" and nginx_container_status.stdout != "running"
  tags:
    - nginx
    - reload-nginx
    - deploy-frontend

- name: Test nginx configuration syntax
  ansible.builtin.shell: |
    docker exec {{ container_names.nginx | mandatory('container_names.nginx must be set in inventory') }} nginx -t
  register: nginx_reload_test
  failed_when: nginx_reload_test.rc != 0
  when: nginx_container_status.stdout == "running"
  tags:
    - nginx
    - reload-nginx
    - deploy-frontend

- name: Reload nginx (hot reload, no downtime)
  ansible.builtin.shell: |
    docker exec {{ container_names.nginx | mandatory('container_names.nginx must be set in inventory') }} nginx -s reload
  when: nginx_container_status.stdout == "running" and nginx_reload_test.rc == 0
  tags:
    - nginx
    - reload-nginx
    - deploy-frontend
