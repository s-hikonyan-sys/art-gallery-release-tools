---
# Nginx ホットリロード専用プレイブック（コンテナが running のときのみ reload）
# 未起動時に起動まで行う場合は playbook_reload_nginx_safe.yml を使用
# 主な用途:
#   - コンテナ起動済みであることが分かっている場合の手動 reload
#   - nginx コンテナの動作確認

- name: Reload Nginx (hot reload only)
  hosts: "{{ target_hosts }}"
  become: "{{ ansible_become | mandatory('ansible_become must be set in inventory') }}"

  tasks:
    - name: Reload nginx (nginx -t check + nginx -s reload)
      ansible.builtin.include_role:
        name: nginx
        tasks_from: reload
      tags:
        - reload-nginx
